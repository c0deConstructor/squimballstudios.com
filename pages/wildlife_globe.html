<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildlife Globe</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:     #0e0e10;
    --surf:   #13131a;
    --border: #2a2a30;
    --accent: #e8ff47;
    --text:   #c8c8d4;
    --muted:  #555560;
    --font:   'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100%;
    overflow: hidden;
    user-select: none;
  }

  /* ── WebGL canvas ── */
  #gl-container { position: fixed; inset: 0; z-index: 0; }
  #gl-container canvas { display: block; }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    pointer-events: none;
  }
  #hud-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #hud-subtitle {
    font-size: 9px;
    letter-spacing: .14em;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
  }

  /* ── Card container (full viewport, pointer-events off so globe still rotates) ── */
  #card-container {
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }

  /* ── Country label ── */
  #country-label {
    position: fixed;
    z-index: 21;
    pointer-events: none;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transition: opacity .15s ease;
    white-space: nowrap;
    transform: translateX(-50%);
  }
  #country-label.visible { opacity: 1; }

  /* ── Individual wildlife card ── */
  .yt-card {
    position: absolute;
    width: 200px;
    background: var(--surf);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    pointer-events: auto;
    overflow: hidden;
    cursor: pointer;

    opacity: 0;
    transform: scale(0.85) translateY(10px);
    transition:
      opacity .22s ease,
      transform .22s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  .yt-card:hover { border-top-color: #fff; }
  .yt-card.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  /* Card thumbnail area (16:9) */
  .yt-card__thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #080810;
    position: relative;
    overflow: hidden;
  }
  .yt-card__thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Skeleton shimmer */
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }
  .yt-card__thumb.loading {
    background-image: linear-gradient(90deg, #0e0e14 0%, #1e1e28 50%, #0e0e14 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .yt-card__thumb.error {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px;
    text-align: center;
  }

  /* Card body */
  .yt-card__body { padding: 7px 9px 9px; }

  .yt-card__title {
    font-size: 10px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
    min-height: 28px;
  }
  .yt-card__title.loading {
    background-image: linear-gradient(90deg, var(--border) 0%, #3a3a48 50%, var(--border) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
    color: transparent;
    height: 28px;
    min-height: unset;
  }

  .yt-card__channel {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: .04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
  }
  .yt-card__channel.loading {
    background-image: linear-gradient(90deg, var(--border) 0%, #3a3a48 50%, var(--border) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
    color: transparent;
    width: 55%;
    height: 11px;
    font-style: normal;
  }
</style>
</head>
<body>

<div id="gl-container"></div>

<div id="hud">
  <div id="hud-title">Wildlife Globe</div>
  <div id="hud-subtitle">hover a country · see local wildlife</div>
</div>

<div id="card-container"></div>
<div id="country-label"></div>

<script type="module">
'use strict';
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ─────────────────────────────────────────────
   Configuration
───────────────────────────────────────────── */
const EARTH_R   = 2.0;
const INIT_DIST = EARTH_R * 3.3;

const COUNTRIES = [
  { name: 'China',        code: 'CN', lat:  35.0, lon: 104.0, color: '#FF4444', radius: 2000 },
  { name: 'India',        code: 'IN', lat:  20.0, lon:  78.0, color: '#FF8C00', radius: 1500 },
  { name: 'USA',          code: 'US', lat:  37.0, lon: -95.0, color: '#4488FF', radius: 2500 },
  { name: 'Indonesia',    code: 'ID', lat:  -2.0, lon: 118.0, color: '#44CC44', radius: 2000 },
  { name: 'Pakistan',     code: 'PK', lat:  29.0, lon:  69.0, color: '#00C8C8', radius:  900 },
  { name: 'Brazil',       code: 'BR', lat: -10.0, lon: -51.0, color: '#22EE88', radius: 2500 },
  { name: 'Nigeria',      code: 'NG', lat:  10.0, lon:   8.0, color: '#FF6B35', radius:  800 },
  { name: 'Bangladesh',   code: 'BD', lat:  23.5, lon:  90.0, color: '#CC44CC', radius:  350 },
  { name: 'Russia',       code: 'RU', lat:  60.0, lon:  90.0, color: '#8888FF', radius: 4000 },
  { name: 'Ethiopia',     code: 'ET', lat:   8.0, lon:  38.0, color: '#FFD700', radius:  800 },
  { name: 'Mexico',       code: 'MX', lat:  23.0, lon:-102.0, color: '#FF55AA', radius: 1200 },
  { name: 'Philippines',  code: 'PH', lat:  12.8, lon: 122.0, color: '#00EEBB', radius:  700 },
  { name: 'Egypt',        code: 'EG', lat:  26.8, lon:  30.8, color: '#FFAA33', radius: 1000 },
  { name: 'DR Congo',     code: 'CD', lat:  -4.0, lon:  22.0, color: '#88FF44', radius: 1000 },
  { name: 'Vietnam',      code: 'VN', lat:  16.0, lon: 107.0, color: '#FF3388', radius:  800 },
  { name: 'Iran',         code: 'IR', lat:  32.0, lon:  53.0, color: '#0099FF', radius: 1200 },
  { name: 'Turkey',       code: 'TR', lat:  39.0, lon:  35.0, color: '#FF9944', radius:  800 },
  { name: 'Germany',      code: 'DE', lat:  51.0, lon:  10.0, color: '#99CCFF', radius:  400 },
  { name: 'Tanzania',     code: 'TZ', lat:  -6.0, lon:  35.0, color: '#FF44DD', radius:  700 },
  { name: 'South Africa', code: 'ZA', lat: -29.0, lon:  25.0, color: '#AAFFAA', radius:  800 },
  { name: 'France',       code: 'FR', lat:  46.0, lon:   2.0, color: '#BB66FF', radius:  500 },
  { name: 'Kenya',        code: 'KE', lat:   0.5, lon:  38.0, color: '#FFCC88', radius:  600 },
  { name: 'Thailand',     code: 'TH', lat:  15.0, lon: 101.0, color: '#AAFF44', radius:  600 },
  { name: 'Japan',        code: 'JP', lat:  36.0, lon: 138.0, color: '#FF7788', radius:  700 },
  { name: 'Argentina',    code: 'AR', lat: -34.0, lon: -65.0, color: '#44DDDD', radius: 1500 },
];

/* Per-country wildlife cache */
const wildlifeCache = {};

/* ─────────────────────────────────────────────
   Three.js — Renderer, Scene, Camera
───────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('gl-container').appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 2000);
camera.position.set(0, 0.8, INIT_DIST);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.07;
controls.minDistance     = EARTH_R * 1.2;
controls.maxDistance     = EARTH_R * 20;
controls.autoRotate      = false;
controls.autoRotateSpeed = 0.4;
controls.rotateSpeed     = 0.45;
controls.mouseButtons    = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

/* ─────────────────────────────────────────────
   Stars
───────────────────────────────────────────── */
{
  const n = 4000;
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const phi   = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r     = 400 + Math.random() * 300;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.6, transparent: true, opacity: 0.55, sizeAttenuation: true,
  })));
}

/* ─────────────────────────────────────────────
   Globe — custom GLSL shader
───────────────────────────────────────────── */
const globeVert = /* glsl */`
  varying vec3 vLocalPos;
  varying vec3 vViewNormal;
  void main() {
    vLocalPos   = position;
    vViewNormal = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const globeFrag = /* glsl */`
  uniform vec3  uGridColor;
  uniform float uGridAlpha;
  varying vec3 vLocalPos;
  varying vec3 vViewNormal;
  #define PI 3.14159265358979
  void main() {
    vec3  n    = normalize(vLocalPos);
    float lat  = asin(clamp(n.y, -1.0, 1.0));
    float lon  = atan(n.x, n.z);
    float latD = lat * (180.0 / PI);
    float lonD = lon * (180.0 / PI);
    float lw   = 0.28;
    float lDist = abs(mod(latD + 15.0, 30.0) - 15.0);
    float lnDist= abs(mod(lonD + 15.0, 30.0) - 15.0);
    float latL  = 1.0 - smoothstep(lw * 0.5, lw * 1.5, lDist);
    float lonL  = 1.0 - smoothstep(lw * 0.5, lw * 1.5, lnDist);
    float eqL   = 1.0 - smoothstep(0.15, 0.55, abs(latD));
    float gridA = clamp(latL * 0.45 + lonL * 0.45 + eqL * 0.4, 0.0, 1.0) * uGridAlpha;
    float facing= max(0.0, vViewNormal.z);
    vec3 body = vec3(0.012, 0.03, 0.07) * (0.3 + 0.7 * facing);
    float pole = abs(n.y);
    body += vec3(0.0, 0.04, 0.08) * pole * 0.25;
    vec3 col = mix(body, uGridColor * 0.55, gridA);
    float rim = pow(1.0 - facing, 2.6);
    col += vec3(0.04, 0.55, 0.95) * rim * 0.45;
    float eq2 = 1.0 - smoothstep(0.0, 12.0, abs(latD));
    col += vec3(0.0, 0.35, 0.6) * eq2 * 0.04;
    gl_FragColor = vec4(col, 1.0);
  }
`;
const globeMat = new THREE.ShaderMaterial({
  vertexShader: globeVert,
  fragmentShader: globeFrag,
  uniforms: {
    uGridColor: { value: new THREE.Color(0x00c8b4) },
    uGridAlpha: { value: 0.55 },
  },
});
const globe = new THREE.Mesh(new THREE.SphereGeometry(EARTH_R, 128, 64), globeMat);
scene.add(globe);

/* ─────────────────────────────────────────────
   Atmosphere layers
───────────────────────────────────────────── */
const mkAtmos = (scale, color, opacity) => {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(EARTH_R * scale, 32, 32),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    })
  );
  scene.add(m);
};
mkAtmos(1.015, 0x00aaff, 0.16);
mkAtmos(1.06,  0x0066cc, 0.07);
mkAtmos(1.18,  0x003388, 0.035);
mkAtmos(1.45,  0x001155, 0.015);

/* ─────────────────────────────────────────────
   Helpers
───────────────────────────────────────────── */
function geo3D(lat, lon, r = EARTH_R) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = lon * Math.PI / 180;
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.cos(theta)
  );
}

function worldToScreen(pos3) {
  const v = pos3.clone().project(camera);
  return {
    x: (v.x + 1) / 2 * window.innerWidth,
    y: -(v.y - 1) / 2 * window.innerHeight,
    vis: v.z < 1,
  };
}

const spriteCache = {};
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}
function getSpriteTex(hex) {
  if (spriteCache[hex]) return spriteCache[hex];
  const cv = document.createElement('canvas');
  cv.width = cv.height = 64;
  const cx = cv.getContext('2d');
  const g2 = cx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g2.addColorStop(0,    hexToRgba(hex, 1.0));
  g2.addColorStop(0.3,  hexToRgba(hex, 0.65));
  g2.addColorStop(0.65, hexToRgba(hex, 0.2));
  g2.addColorStop(1,    hexToRgba(hex, 0.0));
  cx.fillStyle = g2;
  cx.fillRect(0, 0, 64, 64);
  spriteCache[hex] = new THREE.CanvasTexture(cv);
  return spriteCache[hex];
}

/* ─────────────────────────────────────────────
   Country borders (TopoJSON — async, non-blocking)
───────────────────────────────────────────── */
function buildBorderLines(world) {
  const borders = topojson.mesh(world, world.objects.countries);
  const pts = [];
  function addCoords(coords) {
    for (let i = 0; i < coords.length - 1; i++) {
      pts.push(geo3D(coords[i][1],   coords[i][0],   EARTH_R + 0.004));
      pts.push(geo3D(coords[i+1][1], coords[i+1][0], EARTH_R + 0.004));
    }
  }
  if (borders.type === 'MultiLineString') borders.coordinates.forEach(addCoords);
  else if (borders.type === 'LineString') addCoords(borders.coordinates);

  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.LineSegments(geom, new THREE.LineBasicMaterial({
    color: new THREE.Color(0x00c8b4),
    opacity: 0.4,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  })));
}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(buildBorderLines)
  .catch(e => console.warn('[WildlifeGlobe] border load failed:', e.message));

/* ─────────────────────────────────────────────
   Country dots
───────────────────────────────────────────── */
const dotMeshes = [];

for (let i = 0; i < COUNTRIES.length; i++) {
  const country = COUNTRIES[i];
  const pos3    = geo3D(country.lat, country.lon, EARTH_R + 0.015);

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.028, 12, 12),
    new THREE.MeshBasicMaterial({
      color: new THREE.Color(country.color),
      transparent: true,
      opacity: 0.95,
      depthWrite: false,
    })
  );
  sphere.position.copy(pos3);
  scene.add(sphere);

  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: getSpriteTex(country.color),
    transparent: true,
    opacity: 0.65,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  }));
  sprite.position.copy(pos3);
  sprite.scale.setScalar(0.22);
  scene.add(sprite);

  dotMeshes.push({ country, sphere, sprite, pos3, phase: i * 0.4 });
}

/* ─────────────────────────────────────────────
   Raycasting state
───────────────────────────────────────────── */
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2(-99, -99);
let mouseX = -999, mouseY = -999;
let isDragging       = false;
let hoveredCountry   = null;
let activeHoverDot   = null;
let dismissTimer     = null;
let clearContentTimer = null;

controls.addEventListener('start', () => { isDragging = true; });
controls.addEventListener('end',   () => setTimeout(() => { isDragging = false; }, 80));

window.addEventListener('mousemove', e => {
  mouseX  = e.clientX;
  mouseY  = e.clientY;
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

let clickStartX = 0, clickStartY = 0;
window.addEventListener('mousedown', e => { clickStartX = e.clientX; clickStartY = e.clientY; });
renderer.domElement.addEventListener('click', e => {
  if (!hoveredCountry) return;
  if (Math.hypot(e.clientX - clickStartX, e.clientY - clickStartY) > 5) return;
  const nx = (e.clientX / window.innerWidth) * 2 - 1;
  const ny = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
  if (raycaster.intersectObjects(dotMeshes.map(d => d.sphere), false).length > 0) return;
  hideCards();
});

/* ─────────────────────────────────────────────
   Card DOM — 10 cards, created once, reused
───────────────────────────────────────────── */
const cardContainer = document.getElementById('card-container');
const countryLabel  = document.getElementById('country-label');
const cards         = [];

for (let i = 0; i < 10; i++) {
  const card = document.createElement('div');
  card.className = 'yt-card';
  card.innerHTML = `
    <div class="yt-card__thumb loading"></div>
    <div class="yt-card__body">
      <div class="yt-card__title loading"></div>
      <div class="yt-card__channel loading"></div>
    </div>`;
  cardContainer.appendChild(card);
  cards.push(card);
}

/* ─────────────────────────────────────────────
   Card positioning — circular arrangement
───────────────────────────────────────────── */
const CARD_W   = 200;
const CARD_H   = 178;
const CIRCLE_R = 360;
const MARGIN   = 12;

function positionCards(pos3) {
  const sc = worldToScreen(pos3);
  const vW = window.innerWidth;
  const vH = window.innerHeight;
  const cx = sc.x, cy = sc.y;

  for (let i = 0; i < 10; i++) {
    const angle = -Math.PI / 2 + (i / 10) * Math.PI * 2;
    let x = cx + CIRCLE_R * Math.cos(angle) - CARD_W / 2;
    let y = cy + CIRCLE_R * Math.sin(angle) - CARD_H / 2;
    x = Math.max(MARGIN, Math.min(vW - CARD_W - MARGIN, x));
    y = Math.max(MARGIN, Math.min(vH - CARD_H - MARGIN, y));
    cards[i].style.left    = x + 'px';
    cards[i].style.top     = y + 'px';
    cards[i].style.width   = CARD_W + 'px';
    cards[i].style.display = '';
  }

  countryLabel.style.left = cx + 'px';
  countryLabel.style.top  = (cy - 20) + 'px';
}

/* ─────────────────────────────────────────────
   Card state management
───────────────────────────────────────────── */
function setCardsLoading() {
  if (clearContentTimer) { clearTimeout(clearContentTimer); clearContentTimer = null; }
  cards.forEach(card => {
    const thumb   = card.querySelector('.yt-card__thumb');
    const title   = card.querySelector('.yt-card__title');
    const channel = card.querySelector('.yt-card__channel');
    thumb.className     = 'yt-card__thumb loading';
    thumb.innerHTML     = '';
    title.className     = 'yt-card__title loading';
    title.textContent   = '';
    channel.className   = 'yt-card__channel loading';
    channel.textContent = '';
    card.onclick = null;
    card.style.display = '';
  });
}

function showCards() {
  cards.forEach((card, i) => {
    card.style.transitionDelay = (i * 65) + 'ms';
    void card.offsetWidth; // force reflow so transition fires
    card.classList.add('visible');
  });
  countryLabel.classList.add('visible');
}

function hideCards() {
  hoveredCountry = null;
  activeHoverDot = null;
  cards.forEach((card, i) => {
    card.style.transitionDelay = ((9 - i) * 45) + 'ms';
    card.classList.remove('visible');
  });
  countryLabel.classList.remove('visible');
  clearContentTimer = setTimeout(clearCardContent, 700);
}

function clearCardContent() {
  cards.forEach(card => { card.onclick = null; });
}

function populateCards(observations) {
  cards.forEach((card, i) => {
    if (i >= observations.length) { card.style.display = 'none'; return; }
    card.style.display = '';
    const obs     = observations[i];
    const thumb   = card.querySelector('.yt-card__thumb');
    const title   = card.querySelector('.yt-card__title');
    const channel = card.querySelector('.yt-card__channel');

    thumb.className = 'yt-card__thumb';
    thumb.innerHTML = `<img src="${obs.photoUrl}" alt="${obs.commonName}" loading="lazy">`;

    title.className   = 'yt-card__title';
    title.textContent = obs.commonName;

    channel.className   = 'yt-card__channel';
    channel.textContent = `${obs.sciName}${obs.location ? ' · ' + obs.location : ''}`;

    card.onclick = () => window.open(obs.obsUrl, '_blank', 'noopener');
  });
}

function setCardsError(msg) {
  cards.forEach(card => {
    card.style.display = '';
    const thumb   = card.querySelector('.yt-card__thumb');
    const title   = card.querySelector('.yt-card__title');
    const channel = card.querySelector('.yt-card__channel');
    thumb.className     = 'yt-card__thumb error';
    thumb.textContent   = msg || 'unavailable';
    title.className     = 'yt-card__title';
    title.textContent   = '';
    channel.className   = 'yt-card__channel';
    channel.textContent = '';
    card.onclick = null;
  });
}

/* ─────────────────────────────────────────────
   Data fetching — iNaturalist (no API key)
───────────────────────────────────────────── */
async function fetchWildlife(country) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 12000);
  try {
    const params = new URLSearchParams({
      lat:              country.lat,
      lng:              country.lon,
      radius:           country.radius,
      quality_grade:    'research',
      photos:           'true',
      per_page:         '10',
      order_by:         'votes',
      order:            'desc',
      taxon_geoprivacy: 'open',
    });
    const r = await fetch(
      `https://api.inaturalist.org/v1/observations?${params}`,
      { signal: ctrl.signal }
    );
    clearTimeout(tid);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const results = (data.results || []).filter(o => o.photos?.length && o.taxon);
    if (!results.length) throw new Error('no results');
    return results.slice(0, 10).map(o => ({
      photoUrl:   o.photos[0].url.replace('square', 'small'),
      commonName: o.taxon.preferred_common_name || o.taxon.name,
      sciName:    o.taxon.name,
      location:   o.place_guess || country.name,
      obsUrl:     o.uri || `https://www.inaturalist.org/observations/${o.id}`,
    }));
  } finally {
    clearTimeout(tid);
  }
}

/* ─────────────────────────────────────────────
   Hover logic
───────────────────────────────────────────── */
function isMouseInHoverZone() {
  const el = document.elementFromPoint(mouseX, mouseY);
  if (el && el.closest('.yt-card')) return true;
  if (!activeHoverDot) return false;
  const sc = worldToScreen(activeHoverDot.pos3);
  return Math.hypot(mouseX - sc.x, mouseY - sc.y) < CIRCLE_R + 160;
}

function scheduleCardDismiss() {
  if (dismissTimer) return;
  dismissTimer = setTimeout(() => {
    dismissTimer = null;
    if (!isDragging && !isMouseInHoverZone()) hideCards();
  }, 180);
}

async function onCountryHover(country, pos3) {
  hoveredCountry = country;
  positionCards(pos3);
  countryLabel.textContent = country.name;
  setCardsLoading();
  showCards();
  clearCardContent();

  let observations;
  if (wildlifeCache[country.code]) {
    observations = wildlifeCache[country.code];
  } else {
    try {
      observations = await fetchWildlife(country);
      wildlifeCache[country.code] = observations;
    } catch(err) {
      console.error('[WildlifeGlobe] fetch failed for', country.code, ':', err?.message);
      if (hoveredCountry === country) setCardsError('no data');
      return;
    }
  }

  if (hoveredCountry !== country) return;
  populateCards(observations);
}

/* ─────────────────────────────────────────────
   Hover detection (every frame)
───────────────────────────────────────────── */
function checkHover() {
  if (isDragging) return;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(dotMeshes.map(d => d.sphere), false);

  if (hits.length > 0) {
    const dot = dotMeshes.find(d => d.sphere === hits[0].object);
    if (dot) {
      if (dismissTimer) { clearTimeout(dismissTimer); dismissTimer = null; }
      activeHoverDot = dot;
      if (dot.country !== hoveredCountry) onCountryHover(dot.country, dot.pos3);
      renderer.domElement.style.cursor = 'pointer';
      return;
    }
  }

  renderer.domElement.style.cursor = '';
  if (hoveredCountry) {
    if (isMouseInHoverZone()) {
      if (dismissTimer) { clearTimeout(dismissTimer); dismissTimer = null; }
    } else {
      scheduleCardDismiss();
    }
  }
}

/* ─────────────────────────────────────────────
   Render loop
───────────────────────────────────────────── */
function animate(ts) {
  requestAnimationFrame(animate);

  const t      = ts * 0.001;
  const camDir = camera.position.clone().normalize();

  for (const dot of dotMeshes) {
    const pulse = 1.0 + 0.15 * Math.sin(t * (Math.PI * 2 / 2.5) + dot.phase);
    dot.sphere.scale.setScalar(pulse);
    dot.sprite.scale.setScalar(0.22 * (1.0 + 0.28 * Math.sin(t * (Math.PI * 2 / 2.5) + dot.phase)));

    const visible = dot.pos3.clone().normalize().dot(camDir) > 0.05;
    dot.sphere.visible = visible;
    dot.sprite.visible = visible;
  }

  controls.update();
  checkHover();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
