<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Pulse — Flare Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

  :root {
    --bg: #05070f;
    --panel-bg: rgba(8, 12, 24, 0.97);
    --border: rgba(255,209,102,0.20);
    --accent:  #ffd166;
    --accent2: #ff6b35;
    --accent3: #ff3860;
    --text: #e8dec8;
    --text-dim: #8a7a5a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
    --panel-w: 300px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    cursor: grab;
  }
  #canvas.dragging { cursor: grabbing; }

  #grid-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image:
      linear-gradient(rgba(255,209,102,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,209,102,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── QUERY MODAL ── */
  #query-modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,209,102,0.08) 0%, rgba(5,7,15,0.97) 70%);
  }
  #query-modal.hidden { display: none; }

  #query-box {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 36px 40px 32px;
    width: min(560px, 92vw);
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 0 60px rgba(255,209,102,0.10), 0 0 0 1px rgba(255,209,102,0.05);
    position: relative;
  }
  #query-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 40px;
    width: 60px; height: 2px;
    background: var(--accent2);
  }

  .q-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .q-sub {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .q-row { margin-bottom: 16px; }
  .q-row label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .q-row input, .q-row select {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
  }
  .q-row input:focus, .q-row select:focus { border-color: var(--accent); }
  .q-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .q-actions { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
  .q-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .q-btn:hover { background: var(--accent); color: #0a0a0e; }
  .q-btn.secondary { border-color: var(--text-dim); color: var(--text-dim); }
  .q-btn.secondary:hover { background: var(--text-dim); color: #0a0a0e; }
  .q-err {
    color: var(--accent3);
    font-family: var(--mono);
    font-size: 11px;
    margin-top: 12px;
    min-height: 14px;
  }
  .q-warn {
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 11px;
    margin-top: 8px;
  }

  /* ── SETTINGS PANEL ── */
  #settings {
    position: fixed;
    top: 0; left: 0;
    width: var(--panel-w);
    height: 100vh;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    z-index: 50;
    overflow-y: auto;
    transition: transform 0.35s cubic-bezier(0.5,0,0.2,1);
    padding: 20px 18px 80px;
  }
  #settings.collapsed { transform: translateX(calc(-1 * var(--panel-w))); }
  #settings::-webkit-scrollbar { width: 6px; }
  #settings::-webkit-scrollbar-thumb { background: var(--border); }

  #panel-toggle {
    position: fixed;
    top: 14px;
    left: calc(var(--panel-w) + 8px);
    z-index: 51;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    width: 28px; height: 28px;
    cursor: pointer;
    transition: left 0.35s cubic-bezier(0.5,0,0.2,1);
  }
  #settings.collapsed ~ #panel-toggle { left: 8px; }
  #panel-toggle:hover { background: var(--accent); color: #0a0a0e; }

  .sec {
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px dashed rgba(255,209,102,0.10);
  }
  .sec:last-child { border-bottom: none; }
  .sec h3 {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }
  .row .val { color: var(--text); }
  .row input[type=range] {
    flex: 1;
    margin: 0 8px;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    height: 14px;
  }
  .row input[type=range]::-webkit-slider-runnable-track {
    height: 2px; background: var(--border);
  }
  .row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: -4px;
    box-shadow: 0 0 6px var(--accent);
    cursor: pointer;
  }
  .row input[type=range]::-moz-range-track { height: 2px; background: var(--border); }
  .row input[type=range]::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    box-shadow: 0 0 6px var(--accent);
    cursor: pointer;
  }
  .row input[type=color] {
    width: 28px; height: 18px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    padding: 0;
  }
  .row input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

  .label-min { width: 64px; }

  .view-switch {
    display: flex;
    width: 100%;
    border: 1px solid var(--border);
    margin-top: 4px;
  }
  .view-switch button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 8px 4px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .view-switch button.active { background: var(--accent); color: #0a0a0e; }

  .panel-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 8px;
    cursor: pointer;
    margin-top: 6px;
  }
  .panel-btn:hover { background: var(--accent); color: #0a0a0e; }

  /* ── HUD ── */
  #hud {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 55;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    background: linear-gradient(to top, rgba(5,7,15,0.95), rgba(5,7,15,0.0));
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  #hud.hidden { display: none; }

  #progress-track {
    width: 100%;
    height: 3px;
    background: rgba(255,209,102,0.1);
    flex-shrink: 0;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    transition: width 0.08s linear;
  }

  #hud-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
  }

  .hud-btn {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    width: 32px; height: 28px;
    cursor: pointer;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .hud-btn:hover { background: var(--accent); color: #0a0a0e; }
  .hud-spacer { flex: 1; }
  .hud-readout { color: var(--text); margin: 0 4px; }

  #h-status {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid currentColor;
    padding: 2px 6px;
    flex-shrink: 0;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(5,7,15,0.85);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #loading.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    z-index: 60;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-top: 1px solid var(--accent);
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    display: none;
    max-width: 240px;
    line-height: 1.5;
  }
  #tooltip.show { display: block; }
  #tooltip .tt-class { color: var(--accent); font-weight: bold; }
  #tooltip .tt-dim { color: var(--text-dim); }
  #tooltip a { color: var(--accent); pointer-events: auto; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="grid-overlay"></div>

<!-- ── Query Modal ── -->
<div id="query-modal">
  <div id="query-box">
    <div class="q-title">Solar Pulse</div>
    <div class="q-sub">NASA DONKI · Flare Catalog · 2010–present</div>

    <div class="q-grid2">
      <div class="q-row">
        <label>Start date</label>
        <input type="date" id="q-start">
      </div>
      <div class="q-row">
        <label>End date</label>
        <input type="date" id="q-end">
      </div>
    </div>

    <div class="q-row">
      <label>Minimum class</label>
      <select id="q-minclass">
        <option value="A">A — faintest</option>
        <option value="B">B</option>
        <option value="C" selected>C</option>
        <option value="M">M — moderate</option>
        <option value="X">X — strongest</option>
      </select>
    </div>

    <div class="q-row">
      <label>NASA API key (optional)</label>
      <input type="text" id="q-apikey" placeholder="DEMO_KEY (rate limited ~30/hr)" value="DEMO_KEY">
    </div>

    <div class="q-actions">
      <button class="q-btn" id="q-fetch">Fetch flares</button>
      <button class="q-btn secondary" id="q-cancel" style="display:none">Cancel</button>
    </div>
    <div class="q-err" id="q-err"></div>
    <div class="q-warn" id="q-warn"></div>
  </div>
</div>

<!-- ── Settings Panel ── -->
<aside id="settings">
  <div class="sec">
    <h3>View</h3>
    <div class="view-switch">
      <button id="view-disk" class="active">Sun disk</button>
      <button id="view-flat">Flat map</button>
    </div>
    <button class="panel-btn" id="btn-newquery" style="margin-top:14px;">New query</button>
  </div>

  <div class="sec">
    <h3>Animation</h3>
    <div class="row"><span class="label-min">Speed</span><input type="range" id="s-speed" min="0" max="100" step="1" value="35"><span class="val" id="v-speed">126×</span></div>
    <div class="row"><span class="label-min">Fade</span><input type="range" id="s-fade" min="0.3" max="15" step="0.1" value="3"><span class="val" id="v-fade">3.0s</span></div>
    <div class="row"><span class="label-min">Rings</span><input type="range" id="s-rings" min="0" max="5" step="1" value="2"><span class="val" id="v-rings">2</span></div>
  </div>

  <div class="sec">
    <h3>Pulse size</h3>
    <div class="row"><span class="label-min">Base</span><input type="range" id="s-base" min="2" max="40" step="1" value="8"><span class="val" id="v-base">8</span></div>
    <div class="row"><span class="label-min">Scale</span><input type="range" id="s-scale" min="0.5" max="6" step="0.1" value="2.4"><span class="val" id="v-scale">2.4</span></div>
    <div class="row"><span class="label-min">Max</span><input type="range" id="s-max" min="20" max="300" step="5" value="120"><span class="val" id="v-max">120</span></div>
  </div>

  <div class="sec">
    <h3>Colors</h3>
    <div class="row"><span class="label-min">C class</span><input type="color" id="s-cC" value="#ffd166"></div>
    <div class="row"><span class="label-min">M class</span><input type="color" id="s-cM" value="#ff6b35"></div>
    <div class="row"><span class="label-min">X class</span><input type="color" id="s-cX" value="#ff3860"></div>
    <div class="row"><span class="label-min">Sun</span><input type="color" id="s-cSun" value="#ffaa33"></div>
    <div class="row"><span class="label-min">Grid</span><input type="color" id="s-cGrid" value="#5a4a2a"></div>
  </div>

  <div class="sec">
    <h3>Toggles</h3>
    <div class="row"><span>Glow</span><input type="checkbox" id="t-glow" checked></div>
    <div class="row"><span>Trails</span><input type="checkbox" id="t-trails"></div>
    <div class="row"><span>Graticule</span><input type="checkbox" id="t-grat" checked></div>
    <div class="row"><span>Backside events</span><input type="checkbox" id="t-back" checked></div>
  </div>
</aside>
<button id="panel-toggle" title="Toggle panel">‹</button>

<!-- ── HUD ── -->
<div id="hud" class="hidden">
  <div id="progress-track"><div id="progress-fill"></div></div>
  <div id="hud-row">
    <button class="hud-btn" id="h-play" title="Play / pause">▶</button>
    <button class="hud-btn" id="h-restart" title="Restart">⟲</button>
    <button class="hud-btn" id="h-rew" title="Rewind 1h">«</button>
    <span class="hud-readout" id="h-time">—</span>
    <span>Events: <span class="hud-readout" id="h-count">0</span> / <span id="h-total">0</span></span>
    <span id="h-status">PLAYING</span>
    <span class="hud-spacer"></span>
    <button class="hud-btn" id="h-zin" title="Zoom in">+</button>
    <button class="hud-btn" id="h-zout" title="Zoom out">−</button>
    <button class="hud-btn" id="h-reset" title="Reset view">⊙</button>
    <span class="hud-readout" id="h-zoom">1.00×</span>
  </div>
</div>

<!-- ── Loading & tooltip ── -->
<div id="loading"><div class="spinner"></div><div id="loading-msg">Fetching DONKI…</div></div>
<div id="tooltip"></div>

<script>
'use strict';

/* ───────── DOM ───────── */
const $ = id => document.getElementById(id);
const canvas = $('canvas');
const ctx = canvas.getContext('2d');

/* ───────── State ───────── */
const settings = {
  speed: 126, fade: 3, rings: 2,
  base: 8, scale: 2.4, max: 120,
  cC: '#ffd166', cM: '#ff6b35', cX: '#ff3860',
  cSun: '#ffaa33', cGrid: '#5a4a2a',
  glow: true, trails: false, grat: true, back: true,
  view: 'disk',
};

let flares = [];
let activeCircles = [];
let simTime = 0;
let datasetStart = 0;
let datasetEnd = 0;
let firedCount = 0;
let animPaused = false;
let reachedEnd = false;
let awaitingLoop = false;
let loopTimerHandle = null;
let lastFrame = performance.now();

let panX = 0, panY = 0, zoom = 1;
let dragging = false, dragStart = null;

/* ───────── Canvas setup ───────── */
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ───────── Helpers ───────── */
function parseLocation(s) {
  if (!s) return null;
  const m = /^([NS])(\d{1,2})([EW])(\d{1,3})$/i.exec(s.trim());
  if (!m) return null;
  const lat = (m[1].toUpperCase() === 'N' ? 1 : -1) * parseInt(m[2], 10);
  const lon = (m[3].toUpperCase() === 'W' ? 1 : -1) * parseInt(m[4], 10);
  return { lat, lon };
}

function parseClass(s) {
  if (!s) return null;
  const m = /^([ABCMX])([\d.]+)?/i.exec(s.trim());
  if (!m) return null;
  const letter = m[1].toUpperCase();
  const mag = m[2] ? parseFloat(m[2]) : 1;
  return { letter, mag };
}

const CLASS_RANK = { A: 0, B: 1, C: 2, M: 3, X: 4 };

function colorForClass(letter) {
  if (letter === 'X') return settings.cX;
  if (letter === 'M') return settings.cM;
  return settings.cC;
}

function classRadiusMultiplier(letter, mag) {
  const k = { A: 0.5, B: 0.7, C: 1.0, M: 1.6, X: 2.6 }[letter] || 1.0;
  return k * (1 + Math.log10(Math.max(mag, 0.1)) * 0.25);
}

function fmtDate(ms) {
  if (!isFinite(ms)) return '—';
  const d = new Date(ms);
  return d.toISOString().replace('T', ' ').slice(0, 16) + 'Z';
}

function todayStr(offsetDays = 0) {
  const d = new Date(Date.now() + offsetDays * 86400000);
  return d.toISOString().slice(0, 10);
}

/* ───────── Speed scale (log) ───────── */
function sliderToSpeed(v) { return Math.max(1, Math.round(Math.pow(10, v * 7 / 100))); }
function speedToSlider(s) { return Math.min(100, Math.max(0, Math.round(Math.log10(Math.max(s, 1)) * 100 / 7))); }
function speedLabel(s) {
  if (s >= 1000000) return (s / 1000000).toFixed(1) + 'M×';
  if (s >= 1000)    return (s / 1000).toFixed(1) + 'K×';
  return s + '×';
}

function setSpeed(sliderVal) {
  sliderVal = Math.min(100, Math.max(0, Math.round(sliderVal)));
  settings.speed = sliderToSpeed(sliderVal);
  $('s-speed').value = sliderVal;
  $('v-speed').textContent = speedLabel(settings.speed);
}

/* ───────── Projection ───────── */
function sunRadius() {
  return Math.min(window.innerWidth, window.innerHeight) * 0.36;
}

function projectDisk(lat, lon) {
  const latR = lat * Math.PI / 180;
  const lonR = lon * Math.PI / 180;
  const R = sunRadius();
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const x = R * Math.cos(latR) * Math.sin(lonR);
  const y = -R * Math.sin(latR);
  const visible = Math.abs(lon) <= 90;
  return {
    x: cx + (x * zoom) + panX,
    y: cy + (y * zoom) + panY,
    visible,
    backside: !visible,
  };
}

function projectDiskBackside(lat, lon) {
  const latR = lat * Math.PI / 180;
  const R = sunRadius();
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const sign = lon >= 0 ? 1 : -1;
  const x = R * Math.cos(latR) * sign;
  const y = -R * Math.sin(latR);
  return {
    x: cx + (x * zoom) + panX,
    y: cy + (y * zoom) + panY,
    visible: true,
    backside: true,
  };
}

function projectFlat(lat, lon) {
  const W = Math.min(window.innerWidth, window.innerHeight) * 1.6;
  const H = W * 0.5;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const x = (lon / 180) * (W / 2);
  const y = -(lat / 90) * (H / 2);
  return {
    x: cx + (x * zoom) + panX,
    y: cy + (y * zoom) + panY,
    visible: true,
    backside: false,
  };
}

function project(lat, lon, isBackside) {
  if (settings.view === 'flat') return projectFlat(lat, lon);
  return isBackside ? projectDiskBackside(lat, lon) : projectDisk(lat, lon);
}

/* ───────── Background draw ───────── */
function drawBackground() {
  if (settings.trails) {
    ctx.fillStyle = 'rgba(5,7,15,0.12)';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  } else {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.fillStyle = '#05070f';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  }

  if (settings.view === 'disk') drawSunDisk();
  else drawFlatMap();
}

function drawSunDisk() {
  const R = sunRadius() * zoom;
  const cx = window.innerWidth / 2 + panX;
  const cy = window.innerHeight / 2 + panY;

  // Faint dark fill so disk shape reads against background
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(18, 12, 4, 0.35)';
  ctx.fill();
  ctx.strokeStyle = settings.cGrid;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  ctx.stroke();
  ctx.restore();

  if (settings.grat) drawGraticuleDisk(cx, cy, R);
}

function drawGraticuleDisk(cx, cy, R) {
  ctx.save();
  ctx.strokeStyle = settings.cGrid;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.6;
  for (let lat = -60; lat <= 60; lat += 30) {
    const latR = lat * Math.PI / 180;
    ctx.beginPath();
    let first = true;
    for (let lon = -90; lon <= 90; lon += 3) {
      const lonR = lon * Math.PI / 180;
      const x = cx + R * Math.cos(latR) * Math.sin(lonR);
      const y = cy - R * Math.sin(latR);
      if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  for (let lon = -60; lon <= 60; lon += 30) {
    const lonR = lon * Math.PI / 180;
    ctx.beginPath();
    let first = true;
    for (let lat = -90; lat <= 90; lat += 3) {
      const latR = lat * Math.PI / 180;
      const x = cx + R * Math.cos(latR) * Math.sin(lonR);
      const y = cy - R * Math.sin(latR);
      if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy);
  ctx.stroke();
  ctx.restore();
}

function drawFlatMap() {
  const W = Math.min(window.innerWidth, window.innerHeight) * 1.6 * zoom;
  const H = W * 0.5;
  const cx = window.innerWidth / 2 + panX;
  const cy = window.innerHeight / 2 + panY;
  const x0 = cx - W / 2;
  const y0 = cy - H / 2;

  if (!settings.grat) {
    // No fill, no lines — just the bounding box
    ctx.save();
    ctx.strokeStyle = settings.cGrid;
    ctx.globalAlpha = 0.4;
    ctx.strokeRect(x0, y0, W, H);
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.strokeStyle = settings.cGrid;
  ctx.lineWidth = 1;

  // Latitude lines
  ctx.globalAlpha = 0.5;
  for (let lat = -60; lat <= 60; lat += 30) {
    const y = cy - (lat / 90) * (H / 2);
    ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x0 + W, y); ctx.stroke();
  }
  // Longitude lines
  for (let lon = -150; lon <= 150; lon += 30) {
    const x = cx + (lon / 180) * (W / 2);
    ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y0 + H); ctx.stroke();
  }
  // Equator emphasis
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.moveTo(x0, cy); ctx.lineTo(x0 + W, cy); ctx.stroke();

  // Bounding box
  ctx.globalAlpha = 0.55;
  ctx.strokeRect(x0, y0, W, H);
  ctx.restore();
}

/* ───────── Pulse rendering ───────── */
// Animation uses real wall-clock time so speed slider only affects timeline scrubbing
function drawCircle(c, realNow) {
  const age = (realNow - c.startReal) / 1000; // real seconds
  const life = settings.fade;
  if (age > life) { c.dead = true; return; }
  const norm = age / life;
  const alpha = 1 - norm;

  const proj = project(c.lat, c.lon, c.backside);
  const baseAlpha = c.backside ? 0.4 : 1.0;

  const peakR = Math.min(
    settings.max,
    settings.base + settings.base * settings.scale * c.radMult
  );

  ctx.save();
  if (settings.glow) {
    ctx.shadowColor = c.color;
    ctx.shadowBlur = 18 * (1 - norm * 0.5);
  }

  ctx.globalAlpha = alpha * baseAlpha;
  ctx.fillStyle = c.color;
  const coreR = peakR * (0.35 + norm * 0.15);
  ctx.beginPath();
  ctx.arc(proj.x, proj.y, coreR, 0, Math.PI * 2);
  ctx.fill();

  for (let i = 0; i < settings.rings; i++) {
    const ringNorm = (norm + i * 0.18) % 1;
    const ringR = peakR * (0.5 + ringNorm * 1.4);
    ctx.globalAlpha = (1 - ringNorm) * 0.6 * baseAlpha;
    ctx.lineWidth = 2;
    ctx.strokeStyle = c.color;
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, ringR, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

/* ───────── Loop / replay ───────── */
function scheduleLoop() {
  if (awaitingLoop) return;
  awaitingLoop = true;
  loopTimerHandle = setTimeout(() => {
    awaitingLoop = false;
    reachedEnd = false;
    loopTimerHandle = null;
    restartAnim();
  }, 2500);
}

function cancelLoop() {
  if (loopTimerHandle) { clearTimeout(loopTimerHandle); loopTimerHandle = null; }
  awaitingLoop = false;
}

function restartAnim() {
  simTime = 0; firedCount = 0; activeCircles = [];
  animPaused = false;
  reachedEnd = false;
  $('h-play').textContent = '❚❚';
}

/* ───────── Main loop ───────── */
function frame(now) {
  const dt = now - lastFrame;
  lastFrame = now;

  if (!animPaused && flares.length) {
    simTime += dt * settings.speed;
    if (simTime > datasetEnd - datasetStart) {
      simTime = datasetEnd - datasetStart;
      animPaused = true;
      reachedEnd = true;
      $('h-play').textContent = '▶';
    }
    while (firedCount < flares.length && (flares[firedCount].peak - datasetStart) <= simTime) {
      const f = flares[firedCount];
      if (settings.back || !f.backside) {
        activeCircles.push({
          lat: f.lat, lon: f.lon,
          backside: f.backside,
          color: colorForClass(f.classLetter),
          radMult: classRadiusMultiplier(f.classLetter, f.classMag),
          startSim: simTime,
          startReal: now,
          flare: f,
        });
      }
      firedCount++;
    }
  }

  drawBackground();
  for (const c of activeCircles) drawCircle(c, now);
  activeCircles = activeCircles.filter(c => !c.dead);

  // Auto-loop: once timeline ends and all pulses have faded
  if (reachedEnd && activeCircles.length === 0 && !awaitingLoop) {
    scheduleLoop();
  }

  // HUD readouts
  const duration = datasetEnd - datasetStart;
  const pct = duration > 0 ? (simTime / duration) * 100 : 0;
  $('progress-fill').style.width = pct.toFixed(2) + '%';
  $('h-time').textContent = fmtDate(datasetStart + simTime);
  $('h-count').textContent = firedCount;
  $('h-zoom').textContent = zoom.toFixed(2) + '×';

  const statusEl = $('h-status');
  if (awaitingLoop) {
    statusEl.textContent = 'LOOPING…';
    statusEl.style.color = 'var(--accent2)';
  } else if (animPaused) {
    statusEl.textContent = 'PAUSED';
    statusEl.style.color = 'var(--text-dim)';
  } else {
    statusEl.textContent = 'PLAYING';
    statusEl.style.color = 'var(--accent)';
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ───────── Pan / zoom ───────── */
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = { x: e.clientX - panX, y: e.clientY - panY };
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) {
    updateTooltip(e.clientX, e.clientY);
    return;
  }
  panX = e.clientX - dragStart.x;
  panY = e.clientY - dragStart.y;
});
window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('dragging');
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newZoom = Math.max(0.2, Math.min(20, zoom * factor));
  const realFactor = newZoom / zoom;
  if (realFactor === 1) return;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const mx = e.clientX, my = e.clientY;
  panX = panX + (mx - cx - panX) * (1 - realFactor);
  panY = panY + (my - cy - panY) * (1 - realFactor);
  zoom = newZoom;
}, { passive: false });

let pinchStart = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { x: e.touches[0].clientX - panX, y: e.touches[0].clientY - panY };
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStart = { dist: Math.hypot(dx, dy), zoom };
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    panX = e.touches[0].clientX - dragStart.x;
    panY = e.touches[0].clientY - dragStart.y;
  } else if (e.touches.length === 2 && pinchStart) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    zoom = Math.max(0.2, Math.min(20, pinchStart.zoom * dist / pinchStart.dist));
  }
}, { passive: true });
canvas.addEventListener('touchend', () => { dragging = false; pinchStart = null; });

/* ───────── HUD buttons ───────── */
$('h-play').onclick = () => {
  cancelLoop();
  reachedEnd = false;
  animPaused = !animPaused;
  $('h-play').textContent = animPaused ? '▶' : '❚❚';
};
$('h-restart').onclick = () => {
  cancelLoop();
  restartAnim();
};
$('h-rew').onclick = () => {
  cancelLoop();
  reachedEnd = false;
  simTime = Math.max(0, simTime - 3600 * 1000);
  recomputeFired();
  if (animPaused) { animPaused = false; $('h-play').textContent = '❚❚'; }
};
$('h-zin').onclick = () => zoomBy(1.25);
$('h-zout').onclick = () => zoomBy(1 / 1.25);
$('h-reset').onclick = () => { panX = 0; panY = 0; zoom = 1; };

function zoomBy(factor) {
  zoom = Math.max(0.2, Math.min(20, zoom * factor));
}

function recomputeFired() {
  firedCount = 0;
  activeCircles = [];
  while (firedCount < flares.length && (flares[firedCount].peak - datasetStart) <= simTime) {
    firedCount++;
  }
}

/* ───────── Settings wiring ───────── */
function bindRange(id, key, fmt) {
  const el = $(id);
  const out = $('v-' + id.split('-')[1]);
  el.addEventListener('input', () => {
    settings[key] = parseFloat(el.value);
    if (out) out.textContent = fmt(settings[key]);
  });
  if (out) out.textContent = fmt(settings[key]);
}

// Speed uses log scale — wired separately
{
  const el = $('s-speed'), out = $('v-speed');
  el.addEventListener('input', () => setSpeed(parseFloat(el.value)));
  setSpeed(35); // initialize
}
bindRange('s-fade',  'fade',  v => v.toFixed(1) + 's');
bindRange('s-rings', 'rings', v => v.toFixed(0));
bindRange('s-base',  'base',  v => v.toFixed(0));
bindRange('s-scale', 'scale', v => v.toFixed(1));
bindRange('s-max',   'max',   v => v.toFixed(0));

['cC','cM','cX','cSun','cGrid'].forEach(k => {
  $('s-' + k).addEventListener('input', e => settings[k] = e.target.value);
});
['glow','trails','grat','back'].forEach(k => {
  $('t-' + k).addEventListener('change', e => { settings[k] = e.target.checked; });
});

$('view-disk').onclick = () => setView('disk');
$('view-flat').onclick = () => setView('flat');
function setView(v) {
  settings.view = v;
  $('view-disk').classList.toggle('active', v === 'disk');
  $('view-flat').classList.toggle('active', v === 'flat');
  panX = 0; panY = 0; zoom = 1;
}

$('panel-toggle').onclick = () => {
  const s = $('settings');
  s.classList.toggle('collapsed');
  $('panel-toggle').textContent = s.classList.contains('collapsed') ? '›' : '‹';
};

$('btn-newquery').onclick = () => openQueryModal();

/* ───────── Tooltip ───────── */
function updateTooltip(mx, my) {
  let best = null, bestDist = 22;
  for (const c of activeCircles) {
    const p = project(c.lat, c.lon, c.backside);
    const d = Math.hypot(p.x - mx, p.y - my);
    if (d < bestDist) { best = c; bestDist = d; }
  }
  const tt = $('tooltip');
  if (!best) { tt.classList.remove('show'); return; }
  const f = best.flare;
  tt.innerHTML =
    `<span class="tt-class">${f.classLetter}${f.classMag.toFixed(1)}</span>` +
    `<span class="tt-dim"> · peak </span>${fmtDate(f.peak)}<br>` +
    `<span class="tt-dim">loc </span>${f.lat>=0?'N':'S'}${Math.abs(f.lat)}` +
    `${f.lon>=0?'W':'E'}${Math.abs(f.lon)}` +
    (f.backside ? ' <span class="tt-dim">(backside)</span>' : '') +
    (f.activeRegion ? `<br><span class="tt-dim">AR </span>${f.activeRegion}` : '') +
    (f.link ? `<br><a href="${f.link}" target="_blank">DONKI →</a>` : '');
  tt.style.left = (mx + 14) + 'px';
  tt.style.top  = (my + 14) + 'px';
  tt.classList.add('show');
}

/* ───────── Query / fetch ───────── */
function openQueryModal() {
  $('query-modal').classList.remove('hidden');
  $('hud').classList.add('hidden');
  $('q-end').value = todayStr(0);
  $('q-start').value = todayStr(-30);
  $('q-err').textContent = '';
  $('q-warn').textContent = '';
}

function closeQueryModal() {
  $('query-modal').classList.add('hidden');
  $('hud').classList.remove('hidden');
}

$('q-fetch').onclick = doFetch;

function dateRangeWarning(start, end) {
  const days = (new Date(end) - new Date(start)) / 86400000;
  if (days > 180) return 'Range > 6 months — request may be slow or large.';
  if (days > 90)  return 'Range > 3 months — may return many events.';
  return '';
}

$('q-start').addEventListener('change', updateWarn);
$('q-end').addEventListener('change', updateWarn);
function updateWarn() {
  $('q-warn').textContent = dateRangeWarning($('q-start').value, $('q-end').value);
}

async function doFetch() {
  $('q-err').textContent = '';
  const start = $('q-start').value;
  const end = $('q-end').value;
  const minClass = $('q-minclass').value;
  const apiKey = $('q-apikey').value.trim() || 'DEMO_KEY';

  if (!start || !end) { $('q-err').textContent = 'Pick a start and end date.'; return; }
  if (new Date(start) >= new Date(end)) { $('q-err').textContent = 'End must be after start.'; return; }

  const cacheKey = `donki:${start}:${end}:${minClass}`;
  let raw = null;
  try { raw = JSON.parse(sessionStorage.getItem(cacheKey) || 'null'); } catch (e) {}

  if (!raw) {
    $('loading').classList.add('show');
    $('loading-msg').textContent = 'Fetching DONKI…';
    try {
      const url = `https://api.nasa.gov/DONKI/FLR?startDate=${start}&endDate=${end}&api_key=${encodeURIComponent(apiKey)}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      raw = await resp.json();
      try { sessionStorage.setItem(cacheKey, JSON.stringify(raw)); } catch(e) {}
    } catch (err) {
      $('loading').classList.remove('show');
      $('q-err').textContent = 'Fetch failed: ' + err.message;
      return;
    }
    $('loading').classList.remove('show');
  }

  if (!Array.isArray(raw)) {
    $('q-err').textContent = 'Unexpected response from DONKI.';
    return;
  }

  const minRank = CLASS_RANK[minClass] || 0;
  const parsed = [];
  for (const item of raw) {
    const cls = parseClass(item.classType);
    if (!cls) continue;
    if (CLASS_RANK[cls.letter] < minRank) continue;
    const peakStr = item.peakTime || item.beginTime;
    if (!peakStr) continue;
    const peak = Date.parse(peakStr);
    if (!isFinite(peak)) continue;
    const loc = parseLocation(item.sourceLocation);
    let lat = 0, lon = 0, backside = false;
    if (loc) { lat = loc.lat; lon = loc.lon; }
    else { backside = true; lat = (Math.random() * 60 - 30); lon = Math.random() < 0.5 ? -120 : 120; }
    parsed.push({
      peak,
      begin: Date.parse(item.beginTime) || peak,
      end: Date.parse(item.endTime) || peak,
      classLetter: cls.letter,
      classMag: cls.mag,
      lat, lon, backside,
      activeRegion: item.activeRegionNum || null,
      link: item.link || null,
    });
  }
  parsed.sort((a, b) => a.peak - b.peak);

  if (!parsed.length) {
    $('q-err').textContent = 'No flares matched in that range / class.';
    return;
  }

  flares = parsed;
  datasetStart = flares[0].peak;
  datasetEnd = flares[flares.length - 1].peak + 60_000;

  // Auto-set speed so the entire dataset plays back in ~10 real seconds
  const duration = datasetEnd - datasetStart;
  const targetSpeed = duration / (10 * 1000);
  setSpeed(speedToSlider(targetSpeed));

  cancelLoop();
  simTime = 0;
  firedCount = 0;
  activeCircles = [];
  reachedEnd = false;
  animPaused = false;
  $('h-play').textContent = '❚❚';
  $('h-total').textContent = flares.length;

  closeQueryModal();
}

/* ───────── Init ───────── */
openQueryModal();

</script>
</body>
