<script type="module">
'use strict';
import * as THREE from 'three';

const { World, Vec2, Box, Circle } = planck;

// ═══════════════════════════════════════════════════════
//  THREE.JS SCENE SETUP
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.id = 'three-canvas';
document.body.prepend(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x5a7088);
scene.fog = new THREE.Fog(0x5a7088, 180, 480);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 600);
camera.position.set(0, 40, 35);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

const ambient = new THREE.AmbientLight(0x8898aa, 1.6);
const sun     = new THREE.DirectionalLight(0xfff5e0, 2.8);
sun.position.set(60, 100, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 600;
sun.shadow.camera.left = sun.shadow.camera.bottom = -200;
sun.shadow.camera.right = sun.shadow.camera.top = 200;
scene.add(ambient, sun);

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const CAR_W   = 2.2, CAR_L = 4.5, CAR_H = 1.3;
const ROAD_HALF = 7;
const LANE_HALF = 3.5;
const WHEELBASE = 2.6;
const MAX_STEER = 0.46;
const ROAD_STEP = 2;

const ROAD_BUFFER_AHEAD  = 1200;  // m ahead of player
const ROAD_BUFFER_BEHIND = 600;   // m behind player
const SCENERY_SKIP       = 10;    // road points between scenery placements
const ROAD_MESH_CAP      = 1100;  // max pts in dynamic road mesh buffer

const DIFF_SETTINGS = {
  easy:   { time:90, aiSpd:0.80, traffic:8,  evasion:0.25 },
  normal: { time:60, aiSpd:1.00, traffic:14, evasion:0.60 },
  hard:   { time:45, aiSpd:1.15, traffic:20, evasion:0.90 },
};
const CHATTER_LINES = [
  'All units — suspect is running','PIT manoeuvre authorised',
  'Watch for civilian traffic','Cobra 1, I have the visual',
  'Requesting backup — 10-80','Stand by for PIT attempt',
  'Suspect heading northbound','Stay on him, don\'t lose him',
];
const TRAFFIC_COLS = [0xc8a87e,0x8a3535,0x35558a,0x7a8a35,0x8a357a,0x3a7a7a,0xaaaaaa,0x6a503a];

// ═══════════════════════════════════════════════════════
//  PRNG — mulberry32
// ═══════════════════════════════════════════════════════
function mkRNG(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════════════
//  MATH HELPERS
// ═══════════════════════════════════════════════════════
const clamp = (v,a,b) => v<a?a:v>b?b:v;
const lerp  = (a,b,t) => a+(b-a)*t;
function angleDiff(a,b){ let d=((a-b)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI; return d; }
function bodyFwd(body){ const a=body.getAngle(); return {x:-Math.sin(a),y:Math.cos(a)}; }
function bodyRt(body) { const a=body.getAngle(); return {x: Math.cos(a),y:Math.sin(a)}; }

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let state   = 'start';
let diff    = 'normal';
let seed    = 0;
let rng     = null;
let timer   = 60, cdCount = 3, cdTimer = 0;
let pitDone = false, pitRating = '', endReason = '';
let locked  = false;
let sirenT  = 0, sirenPhase = 0;

let roadPts    = [];  // sliding window [{x,y,tx,ty,zone}]
let scenery    = [];  // [{mesh, body}]
let trafficArr = [];  // [{mesh, body, spd, lane, roadSeq}]
let skidLines  = [];
let skidGeo    = null;

// Infinite road generation state
let genX = 0, genY = 0, genAngle = 0;
let genCurvature = 0, genCurveTimer = 0;
let genZone = 'country', genZoneTimer = 0;
let roadBaseSeq = 0, roadGenSeq = 0;

// Road tracking (sequence numbers)
let copRoadSeq = 0, suspRoadSeq = 0;
let trafficSpawnSeq = { fwd: 0, onc: 0 };
let scenerySeedSeq = 0;
let suspectLatShift = 0;

// Dynamic road mesh
let roadPosBuf = null, roadMeshDynamic = null, roadMarkMesh = null;

// World objects
let physWorld  = null;
let copBody    = null, suspBody = null;
let copMesh    = null, suspMesh = null;
let copLights  = null;

const camPos  = new THREE.Vector3();
const camLook = new THREE.Vector3();

const inp = { throttle:false, brake:false, handbrake:false, steer:0 };
const steerCfg = { sensitivity: 0.0007, nonlin: 0.2, recenter: 0.6 };

const SKID_MAX = 2000;
const skidPositions = new Float32Array(SKID_MAX * 3);
let   skidCount = 0;
let   skidMesh  = null;

// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
let aCtx, masterGain, engOsc, engGain, sirenG, sirenO1, sirenO2, screechG;

function initAudio() {
  if (aCtx) return;
  aCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = aCtx.createGain(); masterGain.gain.value = 0; masterGain.connect(aCtx.destination);

  const comp = aCtx.createDynamicsCompressor();
  comp.threshold.value=-18; comp.knee.value=12; comp.ratio.value=4;
  comp.attack.value=0.003; comp.release.value=0.25;
  masterGain.connect(comp); comp.connect(aCtx.destination); masterGain.disconnect(aCtx.destination);
  masterGain.connect(comp);

  engOsc = aCtx.createOscillator(); engOsc.type='sawtooth'; engOsc.frequency.value=85;
  engGain = aCtx.createGain(); engGain.gain.value=0;
  engOsc.connect(engGain); engGain.connect(masterGain); engOsc.start();

  sirenO1=aCtx.createOscillator(); sirenO1.type='sine'; sirenO1.frequency.value=660;
  sirenO2=aCtx.createOscillator(); sirenO2.type='sine'; sirenO2.frequency.value=770;
  sirenG=aCtx.createGain(); sirenG.gain.value=0;
  sirenO1.connect(sirenG); sirenO2.connect(sirenG); sirenG.connect(masterGain);
  sirenO1.start(); sirenO2.start();

  screechG=aCtx.createGain(); screechG.gain.value=0;
  const sbuf=aCtx.createBuffer(1,aCtx.sampleRate,aCtx.sampleRate);
  const sd=sbuf.getChannelData(0); for(let i=0;i<sd.length;i++) sd[i]=Math.random()*2-1;
  const ssrc=aCtx.createBufferSource(); ssrc.buffer=sbuf; ssrc.loop=true;
  const sflt=aCtx.createBiquadFilter(); sflt.type='bandpass'; sflt.frequency.value=900;
  ssrc.connect(sflt); sflt.connect(screechG); screechG.connect(masterGain); ssrc.start();
}

function playImpact(freq, intensity) {
  if (!aCtx) return;
  const o=aCtx.createOscillator(), g=aCtx.createGain();
  o.type='sine'; o.connect(g); g.connect(masterGain);
  const t=aCtx.currentTime;
  o.frequency.setValueAtTime(freq*2.5,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(freq,8),t+0.12);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(intensity,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.85);
  o.start(t); o.stop(t+1.0);
}

function playJingle(win) {
  if (!aCtx) return;
  const notes = win ? [261,330,392,523] : [392,349,311,261];
  notes.forEach((f,i) => {
    const o=aCtx.createOscillator(), g=aCtx.createGain();
    o.type='sine'; o.connect(g); g.connect(masterGain);
    const t=aCtx.currentTime+i*0.13;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.3,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    o.frequency.value=f; o.start(t); o.stop(t+0.3);
  });
}

function updateAudio(dt) {
  if (!aCtx || !copBody) return;
  const vel = copBody.getLinearVelocity();
  const spd = Math.hypot(vel.x, vel.y);
  engOsc.frequency.value = 75 + spd * 3.5;
  engGain.gain.value += ((inp.throttle ? 0.10 + spd*0.0005 : 0.03) - engGain.gain.value) * 0.12;

  sirenT += dt;
  if (sirenT > 0.42) { sirenT=0; sirenPhase^=1; sirenG.gain.value=spd>1 ? (sirenPhase?0.13:0.07) : 0; }

  const rt  = bodyRt(copBody);
  const lat = Math.abs(vel.x*rt.x + vel.y*rt.y);
  screechG.gain.value += (clamp((lat-2)/9,0,1)*(inp.handbrake?1.4:1)*0.16 - screechG.gain.value)*0.14;
}

// ═══════════════════════════════════════════════════════
//  INFINITE ROAD GENERATION
// ═══════════════════════════════════════════════════════
function getRoadPt(seq) {
  const i = seq - roadBaseSeq;
  if (i < 0 || i >= roadPts.length) return null;
  return roadPts[i];
}

// Planck angle for a car facing along road tangent in given lane direction
// lane=+1 → forward, lane=-1 → oncoming (backward along road)
function roadFwdAngle(p, lane) {
  return Math.atan2(-p.tx * lane, p.ty * lane);
}

function findNearRoad(x, y, hintSeq) {
  const WINDOW = 80;
  const hi = clamp(hintSeq - roadBaseSeq, 0, roadPts.length - 1);
  let best = hi, bestD = Infinity;
  for (let di = -WINDOW; di <= WINDOW; di++) {
    const ai = hi + di;
    if (ai < 0 || ai >= roadPts.length) continue;
    const p = roadPts[ai];
    const d = Math.hypot(x - p.x, y - p.y);
    if (d < bestD) { bestD = d; best = ai; }
  }
  return { seq: best + roadBaseSeq, dist: bestD };
}

// Get lane-centre target point lookaheadM ahead for AI steering
// lane=+1 looks in +seq direction (forward), lane=-1 looks in -seq direction (oncoming)
function laneLookAhead(hintSeq, lane, lookaheadM) {
  const ahead = Math.round(lookaheadM / ROAD_STEP);
  const targetSeq = clamp(hintSeq + lane * ahead, roadBaseSeq, roadBaseSeq + roadPts.length - 1);
  const p = getRoadPt(targetSeq);
  if (!p) return null;
  // Camera right = world -X, so forward lane (+1) sits on world -X = player's right
  return { x: p.x - p.ty * LANE_HALF * lane, y: p.y + p.tx * LANE_HALF * lane, p };
}

function initRoad() {
  roadPts = [];
  roadBaseSeq = 0; roadGenSeq = 0;
  genX = 0; genY = 0; genAngle = 0;
  genCurvature = 0; genCurveTimer = 0;
  genZone = 'country'; genZoneTimer = 0;
  extendRoadTo(Math.ceil((ROAD_BUFFER_AHEAD + 300) / ROAD_STEP));
}

function extendRoadTo(targetSeq) {
  while (roadGenSeq < targetSeq) {
    genCurveTimer -= ROAD_STEP;
    if (genCurveTimer <= 0) {
      genCurvature  = (rng() - 0.5) * 0.006;
      genCurveTimer = 120 + rng() * 300;
    }
    genZoneTimer -= ROAD_STEP;
    if (genZoneTimer <= 0) {
      genZone      = rng() < 0.25 ? 'city' : 'country';
      genZoneTimer = 350 + rng() * 650;
    }
    genAngle += genCurvature * ROAD_STEP;
    genX     += Math.sin(genAngle) * ROAD_STEP;
    genY     += Math.cos(genAngle) * ROAD_STEP;
    roadPts.push({ x:genX, y:genY, tx:Math.sin(genAngle), ty:Math.cos(genAngle), zone:genZone });
    roadGenSeq++;
  }
}

function manageRoadBuffer() {
  const aheadNeeded = copRoadSeq + Math.ceil(ROAD_BUFFER_AHEAD / ROAD_STEP);
  if (roadGenSeq < aheadNeeded) extendRoadTo(aheadNeeded);

  const cullBefore = copRoadSeq - Math.ceil(ROAD_BUFFER_BEHIND / ROAD_STEP);
  if (cullBefore > roadBaseSeq + 100) {
    const cullCount = cullBefore - roadBaseSeq;
    roadPts.splice(0, cullCount);
    roadBaseSeq += cullCount;
  }
}

// ═══════════════════════════════════════════════════════
//  DYNAMIC ROAD MESH
// ═══════════════════════════════════════════════════════
const MAT = {
  road:     new THREE.MeshLambertMaterial({ color:0x3a3530 }),
  ground:   new THREE.MeshLambertMaterial({ color:0x2c4a1e }),
  marking:  new THREE.MeshLambertMaterial({ color:0xd4c87a }),
  tree:     new THREE.MeshPhongMaterial({ color:0x2a5520, shininess:10 }),
  trunk:    new THREE.MeshPhongMaterial({ color:0x5a3818 }),
  building: (col) => new THREE.MeshPhongMaterial({ color:col, shininess:30 }),
  wheel:    new THREE.MeshPhongMaterial({ color:0x111111, shininess:20 }),
  glass:    new THREE.MeshPhongMaterial({ color:0x1a2838, transparent:true, opacity:0.75, shininess:80 }),
};

function initRoadMesh() {
  const VERTS = ROAD_MESH_CAP * 2;

  roadPosBuf = new Float32Array(VERTS * 3);
  const geo  = new THREE.BufferGeometry();
  const posAttr = new THREE.BufferAttribute(roadPosBuf, 3);
  posAttr.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position', posAttr);

  // Upward normals — road is flat in XZ plane, always lit correctly from above
  const normBuf = new Float32Array(VERTS * 3);
  for (let i = 1; i < normBuf.length; i += 3) normBuf[i] = 1.0;
  geo.setAttribute('normal', new THREE.BufferAttribute(normBuf, 3));

  const iArr = new Uint32Array((ROAD_MESH_CAP - 1) * 6);
  for (let i = 0; i < ROAD_MESH_CAP - 1; i++) {
    const a=i*2, b=a+1, c=a+2, d=a+3;
    iArr.set([a,c,b, b,c,d], i*6);  // CCW winding for upward-facing normal
  }
  geo.setIndex(new THREE.BufferAttribute(iArr, 1));
  geo.setDrawRange(0, 0);

  roadMeshDynamic = new THREE.Mesh(geo, MAT.road);
  roadMeshDynamic.receiveShadow = true;
  scene.add(roadMeshDynamic);

  // Lane marking mesh (dashed centre line)
  const markBuf  = new Float32Array(VERTS * 3);
  const markGeo  = new THREE.BufferGeometry();
  const markAttr = new THREE.BufferAttribute(markBuf, 3);
  markAttr.setUsage(THREE.DynamicDrawUsage);
  markGeo.setAttribute('position', markAttr);
  const markNorm = new Float32Array(VERTS * 3);
  for (let i = 1; i < markNorm.length; i += 3) markNorm[i] = 1.0;
  markGeo.setAttribute('normal', new THREE.BufferAttribute(markNorm, 3));
  const mIdx = new Uint32Array((ROAD_MESH_CAP - 1) * 6);
  for (let i = 0; i < ROAD_MESH_CAP - 1; i++) {
    const a=i*2, b=a+1, c=a+2, d=a+3;
    mIdx.set([a,c,b, b,c,d], i*6);
  }
  markGeo.setIndex(new THREE.BufferAttribute(mIdx, 1));
  markGeo.setDrawRange(0, 0);
  roadMarkMesh = new THREE.Mesh(markGeo, MAT.marking);
  roadMarkMesh.renderOrder = 1;
  scene.add(roadMarkMesh);
}

function updateRoadMesh() {
  if (!roadMeshDynamic) return;
  const N   = Math.min(roadPts.length, ROAD_MESH_CAP);
  const pos = roadPosBuf;
  const markPos = roadMarkMesh.geometry.attributes.position.array;

  const dashLen = 8, dashGap = 12, dashStep = dashLen + dashGap;
  let accum = 0;

  for (let i = 0; i < N; i++) {
    const p  = roadPts[i];
    const hw = ROAD_HALF + 0.5;
    const vi = i * 6;
    pos[vi]   = p.x - p.ty*hw; pos[vi+1] = 0.08; pos[vi+2] = p.y + p.tx*hw;
    pos[vi+3] = p.x + p.ty*hw; pos[vi+4] = 0.08; pos[vi+5] = p.y - p.tx*hw;

    // Dashed centre marking — degenerate quad when in gap (zero-area → invisible)
    const inDash = (accum % dashStep) < dashLen;
    const mw = 0.18;
    if (inDash) {
      markPos[vi]   = p.x - p.ty*mw; markPos[vi+1] = 0.13; markPos[vi+2] = p.y + p.tx*mw;
      markPos[vi+3] = p.x + p.ty*mw; markPos[vi+4] = 0.13; markPos[vi+5] = p.y - p.tx*mw;
    } else {
      markPos[vi]   = p.x; markPos[vi+1] = 0.13; markPos[vi+2] = p.y;
      markPos[vi+3] = p.x; markPos[vi+4] = 0.13; markPos[vi+5] = p.y;
    }
    if (i > 0) accum += ROAD_STEP;
  }

  roadMeshDynamic.geometry.attributes.position.needsUpdate = true;
  roadMeshDynamic.geometry.setDrawRange(0, Math.max(0, (N-1)*6));
  roadMarkMesh.geometry.attributes.position.needsUpdate = true;
  roadMarkMesh.geometry.setDrawRange(0, Math.max(0, (N-1)*6));
}

function buildGroundPlane() {
  const g = new THREE.Mesh(new THREE.PlaneGeometry(12000,12000), MAT.ground);
  g.rotation.x = -Math.PI/2; g.position.y = 0; g.receiveShadow = true;
  scene.add(g);
}

function buildTree(x, y, h) {
  const g = new THREE.Group();
  g.position.set(x, 0, y);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4, h*0.45, 8), MAT.trunk);
  trunk.position.y = h*0.225; trunk.castShadow=true;
  const canopy = new THREE.Mesh(new THREE.ConeGeometry(h*0.55, h*0.72, 8), MAT.tree);
  canopy.position.y = h*0.45+h*0.36; canopy.castShadow=true;
  g.add(trunk, canopy);
  return g;
}

function buildBuilding(x, y, w, d, h, col) {
  const g = new THREE.Group();
  g.position.set(x, 0, y);
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), MAT.building(col));
  body.position.y = h/2; body.castShadow=true; body.receiveShadow=true;
  g.add(body);
  return g;
}

function buildCarMesh(role) {
  const g = new THREE.Group();

  const bodyCol  = role==='cop' ? 0x1a1e2a : role==='suspect' ? 0xd8cfc0 : 0xaaaaaa;
  const bodyMat  = new THREE.MeshPhongMaterial({ color:bodyCol, shininess:60 });
  const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(CAR_W, CAR_H, CAR_L), bodyMat);
  bodyMesh.position.y = 0.35 + CAR_H/2; bodyMesh.castShadow=true;
  g.add(bodyMesh);

  const winFront = new THREE.Mesh(new THREE.BoxGeometry(CAR_W-0.3, CAR_H*0.48, 0.08), MAT.glass);
  winFront.position.set(0, 0.35+CAR_H*0.72, -(CAR_L/2)+0.04);
  const winRear  = winFront.clone();
  winRear.position.z = (CAR_L/2)-0.04;
  g.add(winFront, winRear);

  const wheelGeo = new THREE.CylinderGeometry(0.36,0.36,0.28,14);
  const wPositions = [
    [-CAR_W/2-0.04, 0.36, -CAR_L*0.32],
    [ CAR_W/2+0.04, 0.36, -CAR_L*0.32],
    [-CAR_W/2-0.04, 0.36,  CAR_L*0.32],
    [ CAR_W/2+0.04, 0.36,  CAR_L*0.32],
  ];
  wPositions.forEach(([wx,wy,wz]) => {
    const w = new THREE.Mesh(wheelGeo, MAT.wheel);
    w.position.set(wx,wy,wz); w.rotation.z=Math.PI/2; w.castShadow=true;
    g.add(w);
  });

  const archMat = new THREE.MeshPhongMaterial({ color:0x111111, shininess:10 });
  const archGeo = new THREE.BoxGeometry(0.12, 0.38, CAR_L*0.52);
  [-CAR_W/2-0.06, CAR_W/2+0.06].forEach(ax => {
    const a=new THREE.Mesh(archGeo,archMat);
    a.position.set(ax,0.35+0.1,0); g.add(a);
  });

  if (role==='cop') {
    const liveryMat = new THREE.MeshPhongMaterial({ color:0xf0f0f0, shininess:50 });
    const livery    = new THREE.Mesh(new THREE.BoxGeometry(CAR_W+0.02, CAR_H*0.40, CAR_L*0.55), liveryMat);
    livery.position.set(0, 0.35+CAR_H*0.28, 0);
    g.add(livery);

    const lbBase = new THREE.Mesh(new THREE.BoxGeometry(CAR_W*0.75, 0.18, 0.52),
      new THREE.MeshPhongMaterial({ color:0x222222 }));
    lbBase.position.set(0, 0.35+CAR_H+0.09, -0.2); g.add(lbBase);

    const redMat  = new THREE.MeshPhongMaterial({ color:0xff1122, emissive:0xff1122, emissiveIntensity:1 });
    const blueMat = new THREE.MeshPhongMaterial({ color:0x1133ff, emissive:0x1133ff, emissiveIntensity:1 });
    const lbGeoH = new THREE.BoxGeometry(CAR_W*0.33, 0.16, 0.38);
    const lbR = new THREE.Mesh(lbGeoH, redMat);  lbR.position.set(-CAR_W*0.19, 0.35+CAR_H+0.09, -0.2);
    const lbB = new THREE.Mesh(lbGeoH, blueMat); lbB.position.set( CAR_W*0.19, 0.35+CAR_H+0.09, -0.2);
    g.add(lbR, lbB);
    g.userData.lightBar = [lbR, lbB];

  } else if (role==='suspect') {
    const stripeCol = [0xaa2222,0x226688,0x887722,0x228855][Math.floor(rng()*4)];
    const stripeMat = new THREE.MeshPhongMaterial({ color:stripeCol });
    const stripe    = new THREE.Mesh(new THREE.BoxGeometry(0.35, CAR_H+0.02, CAR_L*0.7), stripeMat);
    stripe.position.set(0, 0.35+CAR_H/2, 0); g.add(stripe);
  }

  return g;
}

function buildSkidSystem() {
  const geo = new THREE.BufferGeometry();
  const posAttr = new THREE.BufferAttribute(skidPositions, 3);
  posAttr.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position', posAttr);
  skidMesh = new THREE.Points(geo, new THREE.PointsMaterial({ color:0x1a1208, size:0.4, sizeAttenuation:true }));
  skidMesh.renderOrder = 1;
  scene.add(skidMesh);
}

// ═══════════════════════════════════════════════════════
//  PHYSICS WORLD
// ═══════════════════════════════════════════════════════
let crashFlag = false;

function buildPhysWorld() {
  physWorld = World({ gravity: Vec2(0, 0) });
  crashFlag = false;

  physWorld.on('begin-contact', contact => {
    if (crashFlag || state!=='playing') return;
    const ba = contact.getFixtureA().getBody();
    const bb = contact.getFixtureB().getBody();
    const ua = ba.getUserData(), ub = bb.getUserData();
    const isCop = ua==='cop' || ub==='cop';
    if (!isCop) return;
    const other = ua==='cop' ? ub : ua;
    if (other==='static') {
      const vel = copBody.getLinearVelocity();
      if (Math.hypot(vel.x,vel.y) > 4) crashFlag = true;
    } else if (other==='traffic') {
      const vel = copBody.getLinearVelocity();
      if (Math.hypot(vel.x,vel.y) > 3) crashFlag = true;
    }
  });
}

function makeCarBody(x, y, angle, tag) {
  const body = physWorld.createBody({
    type:'dynamic', position:Vec2(x,y), angle, linearDamping:0.08, angularDamping:2.5
  });
  body.createFixture({ shape:Box(CAR_W/2, CAR_L/2), density:1, friction:0.3, restitution:0.15 });
  body.setUserData(tag);
  return body;
}

function makeStaticBody(x, y, hw, hh) {
  const body = physWorld.createBody({ type:'static', position:Vec2(x,y) });
  body.createFixture({ shape:Box(hw,hh), friction:0.4, restitution:0.2 });
  body.setUserData('static');
  return body;
}

function makeStaticCircle(x, y, r) {
  const body = physWorld.createBody({ type:'static', position:Vec2(x,y) });
  body.createFixture({ shape:Circle(r), friction:0.4, restitution:0.3 });
  body.setUserData('static');
  return body;
}

// ═══════════════════════════════════════════════════════
//  VEHICLE PHYSICS
// ═══════════════════════════════════════════════════════
function vehicleStep(body, input, engineMul, maxSpeedKph) {
  const fwd = bodyFwd(body);
  const rt  = bodyRt(body);
  const vel = body.getLinearVelocity();
  const fwdSpd = vel.x*fwd.x + vel.y*fwd.y;
  const latSpd = vel.x*rt.x  + vel.y*rt.y;

  const grip = input.handbrake ? 0.22 : 0.88;
  body.setLinearVelocity(Vec2(vel.x - rt.x*latSpd*grip, vel.y - rt.y*latSpd*grip));

  const m   = body.getMass();
  let force = 0;
  if (input.throttle) force  = m * 8.0 * engineMul;
  if (input.brake)    force -= m * 13.5;
  force -= fwdSpd * m * 0.15;
  body.applyForceToCenter(Vec2(fwd.x*force, fwd.y*force), true);

  const maxSpd = maxSpeedKph / 3.6;
  const curSpd = Math.hypot(vel.x, vel.y);
  if (curSpd > maxSpd) {
    const v = body.getLinearVelocity();
    body.setLinearVelocity(Vec2(v.x*maxSpd/curSpd, v.y*maxSpd/curSpd));
  }

  if (Math.abs(fwdSpd) > 0.5) {
    const steerRad = input.steer * MAX_STEER;
    const turnRate = fwdSpd * Math.tan(steerRad) / WHEELBASE;
    body.setAngularVelocity(turnRate);
  }
}

// ═══════════════════════════════════════════════════════
//  AI HELPERS
// ═══════════════════════════════════════════════════════
function closestCarAhead(body, lane, cars) {
  const pos = body.getPosition();
  const fwd = bodyFwd(body);
  let minDist = Infinity;
  for (const c of cars) {
    if (c.body === body) continue;
    if (c.lane !== lane) continue;
    const cp = c.body.getPosition();
    const dx = cp.x - pos.x, dy = cp.y - pos.y;
    const ahead = dx*fwd.x + dy*fwd.y;
    if (ahead < 1 || ahead > 60) continue;
    const lat = Math.abs(dx*(-fwd.y) + dy*fwd.x);
    if (lat < CAR_W + 1.5) minDist = Math.min(minDist, ahead);
  }
  return minDist;
}

// ═══════════════════════════════════════════════════════
//  SUSPECT AI
// ═══════════════════════════════════════════════════════
function suspectAI(dt) {
  const ds  = DIFF_SETTINGS[diff];
  const pos = suspBody.getPosition();
  const vel = suspBody.getLinearVelocity();
  const spd = Math.hypot(vel.x, vel.y);

  const nr = findNearRoad(pos.x, pos.y, suspRoadSeq);
  suspRoadSeq = nr.seq;

  const lookM = 15 + spd * 0.5;
  const tgt   = laneLookAhead(suspRoadSeq, 1, lookM);
  if (!tgt) return;

  // Avoid traffic ahead — shift laterally within lane
  const aheadDist = closestCarAhead(suspBody, 1, trafficArr);
  suspectLatShift += (((aheadDist < 25) ? -1.0 : 0) - suspectLatShift) * clamp(3 * dt, 0, 1);
  const tp = tgt.p;
  const sx = tgt.x - (tp ? tp.ty : 0) * suspectLatShift * (LANE_HALF - 1.5);
  const sy = tgt.y + (tp ? tp.tx : 0) * suspectLatShift * (LANE_HALF - 1.5);

  const dx = sx - pos.x, dy = sy - pos.y;
  const wantAngle = Math.atan2(-dx, dy);
  const curAngle  = suspBody.getAngle();
  const err = angleDiff(wantAngle, curAngle);
  let steer = clamp(err * 1.8, -1, 1);

  // Evasion: push away from cop
  const cp = copBody.getPosition();
  const distToCop = Math.hypot(cp.x - pos.x, cp.y - pos.y);
  if (distToCop < 30) {
    const toCopAngle = Math.atan2(-(cp.x-pos.x), cp.y-pos.y);
    steer -= angleDiff(toCopAngle, curAngle) * ds.evasion * 1.2;
    steer  = clamp(steer, -1, 1);
  }

  const aidInp = { throttle:true, brake:false, handbrake:false, steer };

  // Brake on tight bends
  const bSeq = suspRoadSeq + Math.round(10 / ROAD_STEP);
  const bp   = getRoadPt(bSeq);
  if (bp) {
    const bAngle = Math.atan2(-(bp.x-pos.x), bp.y-pos.y);
    if (Math.abs(angleDiff(bAngle, curAngle)) > 0.45 && spd > 25*ds.aiSpd) aidInp.brake = true;
  }
  if (spd > 44 * ds.aiSpd) aidInp.throttle = false;

  vehicleStep(suspBody, aidInp, ds.aiSpd, 50*ds.aiSpd);
}

// ═══════════════════════════════════════════════════════
//  TRAFFIC AI
// ═══════════════════════════════════════════════════════
function trafficStep(car, dt) {
  const pos = car.body.getPosition();
  const vel = car.body.getLinearVelocity();
  const spd = Math.hypot(vel.x, vel.y);

  const nr = findNearRoad(pos.x, pos.y, car.roadSeq);
  car.roadSeq = nr.seq;

  const lookM = 12 + spd * 0.35;
  const tgt   = laneLookAhead(car.roadSeq, car.lane, lookM);
  if (!tgt) return;

  const dx  = tgt.x - pos.x, dy = tgt.y - pos.y;
  const wa  = Math.atan2(-dx, dy);
  const err = angleDiff(wa, car.body.getAngle());

  const aheadDist = closestCarAhead(car.body, car.lane, trafficArr);
  const tooClose  = aheadDist < 15;

  const ainp = {
    throttle: !tooClose && spd < car.spd,
    brake:    tooClose || spd > car.spd + 3,
    handbrake: false,
    steer:    clamp(err * 2, -1, 1)
  };
  vehicleStep(car.body, ainp, 0.62, car.spd * 3.6);
}

// ═══════════════════════════════════════════════════════
//  STREAMING — TRAFFIC
// ═══════════════════════════════════════════════════════
function trafficSpawnProb() {
  // Cars per road-point per lane, scaled by difficulty
  return DIFF_SETTINGS[diff].traffic /
         ((ROAD_BUFFER_AHEAD + ROAD_BUFFER_BEHIND) / ROAD_STEP * 2);
}

function spawnTrafficCar(seq, lane) {
  const p = getRoadPt(seq); if (!p) return;
  const lx    = p.x - p.ty * LANE_HALF * lane;
  const ly    = p.y + p.tx * LANE_HALF * lane;
  const angle = roadFwdAngle(p, lane);
  const tb    = makeCarBody(lx, ly, angle, 'traffic');
  const tm    = buildCarMesh('traffic');
  tm.children.forEach(c => {
    if (c.material && c.material !== MAT.wheel && c.material !== MAT.glass) {
      c.material = c.material.clone();
      c.material.color.setHex(TRAFFIC_COLS[Math.floor(rng() * TRAFFIC_COLS.length)]);
    }
  });
  scene.add(tm);
  const tspd = 10 + rng() * 18;
  const fwd  = bodyFwd(tb);
  tb.setLinearVelocity(Vec2(fwd.x * tspd, fwd.y * tspd));
  trafficArr.push({ mesh:tm, body:tb, spd:tspd, lane, roadSeq:seq });
}

function streamTraffic() {
  const prob = trafficSpawnProb();
  const fwdTarget = roadGenSeq - 10;

  while (trafficSpawnSeq.fwd < fwdTarget) {
    const seq = trafficSpawnSeq.fwd;
    if (getRoadPt(seq) && rng() < prob) spawnTrafficCar(seq, 1);
    trafficSpawnSeq.fwd++;
  }
  while (trafficSpawnSeq.onc < fwdTarget) {
    const seq = trafficSpawnSeq.onc;
    if (getRoadPt(seq) && rng() < prob) spawnTrafficCar(seq, -1);
    trafficSpawnSeq.onc++;
  }

  // Cull traffic far behind player
  const cullSeq = copRoadSeq - Math.ceil(ROAD_BUFFER_BEHIND / ROAD_STEP) - 80;
  for (let i = trafficArr.length - 1; i >= 0; i--) {
    const t = trafficArr[i];
    if (t.roadSeq < cullSeq) {
      scene.remove(t.mesh);
      t.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); });
      try { physWorld.destroyBody(t.body); } catch(e) {}
      trafficArr.splice(i, 1);
    }
  }
}

// ═══════════════════════════════════════════════════════
//  STREAMING — SCENERY
// ═══════════════════════════════════════════════════════
function tryPlaceScenery(p) {
  for (const side of [-1, 1]) {
    const minOff = ROAD_HALF + 3;
    const maxOff = ROAD_HALF + (p.zone === 'city' ? 38 : 58);
    const off = minOff + rng() * (maxOff - minOff);
    const sx  = p.x + p.ty * off * side + (rng()-0.5) * 6;
    const sy  = p.y - p.tx * off * side + (rng()-0.5) * 6;

    if (p.zone === 'country') {
      if (rng() < 0.75) {
        const h    = 3 + rng() * 4;
        const mesh = buildTree(sx, sy, h);
        scene.add(mesh);
        const body = makeStaticCircle(sx, sy, h * 0.4);
        scenery.push({ mesh, body });
      } else {
        const w=7+rng()*6, d=6+rng()*5, h=3+rng()*2;
        const col=new THREE.Color().setHSL(0.08+rng()*0.05, 0.2+rng()*0.1, 0.28+rng()*0.12).getHex();
        const mesh = buildBuilding(sx, sy, w, d, h, col);
        scene.add(mesh);
        const body = makeStaticBody(sx, sy, w/2, d/2);
        scenery.push({ mesh, body });
      }
    } else {
      const w=12+rng()*24, d=10+rng()*18, h=5+rng()*15;
      const grey = 0.20 + rng() * 0.15;
      const col  = new THREE.Color(grey, grey, grey+0.02).getHex();
      const mesh = buildBuilding(sx, sy, w, d, h, col);
      scene.add(mesh);
      const body = makeStaticBody(sx, sy, w/2, d/2);
      scenery.push({ mesh, body });
    }
  }
}

function streamScenery() {
  const target = roadGenSeq - 5;
  while (scenerySeedSeq < target) {
    if (scenerySeedSeq % SCENERY_SKIP === 0) {
      const p = getRoadPt(scenerySeedSeq);
      if (p) tryPlaceScenery(p);
    }
    scenerySeedSeq++;
  }

  // Cull scenery far behind player
  if (copBody) {
    const cop = copBody.getPosition();
    const cullDist = ROAD_BUFFER_BEHIND + 400;
    for (let i = scenery.length - 1; i >= 0; i--) {
      const s  = scenery[i];
      const sp = s.mesh.position;
      if (Math.hypot(sp.x - cop.x, sp.z - cop.y) > cullDist) {
        scene.remove(s.mesh);
        s.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); });
        try { physWorld.destroyBody(s.body); } catch(e) {}
        scenery.splice(i, 1);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
//  PIT DETECTION
// ═══════════════════════════════════════════════════════
let pitCooldown = 0;

function checkPIT(dt) {
  pitCooldown -= dt;
  if (pitCooldown > 0) return;

  const cop = copBody, susp = suspBody;
  const copAngle  = cop.getAngle();
  const suspAngle = susp.getAngle();
  const adiff     = Math.abs(angleDiff(copAngle, suspAngle));

  if (adiff < 0.12 || adiff > 1.05) return;

  const copFwd = bodyFwd(cop);
  const copRt  = bodyRt(cop);
  const copPos = cop.getPosition();
  const frontCorners = [
    Vec2(copPos.x + copFwd.x*CAR_L/2 + copRt.x*CAR_W/2, copPos.y + copFwd.y*CAR_L/2 + copRt.y*CAR_W/2),
    Vec2(copPos.x + copFwd.x*CAR_L/2 - copRt.x*CAR_W/2, copPos.y + copFwd.y*CAR_L/2 - copRt.y*CAR_W/2),
  ];

  const copVel  = cop.getLinearVelocity();
  const suspVel = susp.getLinearVelocity();
  const relSpd  = (copVel.x-suspVel.x)*copFwd.x + (copVel.y-suspVel.y)*copFwd.y;
  if (relSpd < 1.5) return;

  for (const corner of frontCorners) {
    const local = susp.getLocalPoint(corner);
    if (local.y > -CAR_L*0.05) continue;
    if (Math.abs(local.x) < CAR_W*0.15) continue;

    const dir    = Math.sign(local.x);
    const pushA  = copAngle + Math.PI/2 * dir;
    const spinMag = relSpd * 0.30;
    const pushMag = relSpd * 0.55;

    susp.setAngularVelocity(susp.getAngularVelocity() + dir * spinMag);
    susp.applyLinearImpulse(Vec2(Math.sin(pushA)*pushMag*susp.getMass(), -Math.cos(pushA)*pushMag*susp.getMass()),
      susp.getWorldCenter(), true);

    const q = (relSpd/18)*0.45 + (1-Math.abs(adiff-0.45)/0.5)*0.55;
    if (q>0.78) pitRating='TEXTBOOK';
    else if (q>0.55) pitRating='GOOD';
    else if (q>0.35) pitRating='ROUGH';
    else pitRating='LUCKY';

    playImpact(42, 0.75);
    pitCooldown = 1.5;
    break;
  }
}

// ═══════════════════════════════════════════════════════
//  SKID MARKS
// ═══════════════════════════════════════════════════════
function addSkids(body) {
  const vel = body.getLinearVelocity();
  const rt  = bodyRt(body);
  const lat = Math.abs(vel.x*rt.x + vel.y*rt.y);
  if (lat < 1.5 && !inp.handbrake) return;
  const pos = body.getPosition();
  const fwd = bodyFwd(body);
  const bx  = pos.x - fwd.x*CAR_L*0.3;
  const by  = pos.y - fwd.y*CAR_L*0.3;
  const hw  = CAR_W*0.42;
  for (const side of [-1,1]) {
    if (skidCount < SKID_MAX) {
      const si = skidCount*3;
      skidPositions[si]   = bx + rt.x*hw*side;
      skidPositions[si+1] = 0.12;
      skidPositions[si+2] = by + rt.y*hw*side;
      skidCount++;
    }
  }
  skidMesh.geometry.attributes.position.needsUpdate = true;
  skidMesh.geometry.setDrawRange(0, skidCount);
}

// ═══════════════════════════════════════════════════════
//  TOAST / CHATTER
// ═══════════════════════════════════════════════════════
let toastTimer=0;
function showToast(msg, col) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.color=col||'#e8d040'; el.style.opacity='1';
  toastTimer=1.8;
}
function showChatter(msg) {
  const el=document.getElementById('chatter');
  el.textContent=msg; el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0', 2800);
}
let chatCooldown=8;
function maybeChatUpdate(dt) {
  chatCooldown-=dt;
  if (chatCooldown<=0) {
    chatCooldown=12+rng()*14;
    showChatter(CHATTER_LINES[Math.floor(rng()*CHATTER_LINES.length)]);
  }
}

// ═══════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════
const wCtx = document.getElementById('wheel-cvs').getContext('2d');
const mCtx = document.getElementById('minimap-cvs').getContext('2d');

function updateHUD(dt) {
  const secs = Math.ceil(timer);
  const tel  = document.getElementById('hud-timer');
  tel.textContent = secs + 's';
  tel.className   = timer<5?'crit':timer<15?'warn':'';

  const vel = copBody.getLinearVelocity();
  const kph = Math.round(Math.hypot(vel.x,vel.y)*3.6);
  document.getElementById('hud-speed').textContent = kph + ' km/h';

  const sv = suspBody.getLinearVelocity();
  const suspSpd = Math.round(Math.hypot(sv.x,sv.y)*3.6);
  const nr  = findNearRoad(suspBody.getPosition().x, suspBody.getPosition().y, suspRoadSeq);
  const onRoad = nr.dist < ROAD_HALF + 2;
  document.getElementById('hud-state').textContent = 'SUSPECT ' + suspSpd + ' · ' + (onRoad?'ON ROAD':'OFF ROAD');

  toastTimer -= dt;
  if (toastTimer <= 0) document.getElementById('toast').style.opacity='0';

  // Steering wheel
  wCtx.clearRect(0,0,80,80);
  wCtx.save(); wCtx.translate(40,40); wCtx.rotate(inp.steer * MAX_STEER * 2.2);
  wCtx.strokeStyle='#5a4838'; wCtx.lineWidth=5;
  wCtx.beginPath(); wCtx.arc(0,0,28,0,Math.PI*2); wCtx.stroke();
  wCtx.lineWidth=3;
  for (let i=0;i<3;i++) {
    wCtx.save(); wCtx.rotate(i*Math.PI*2/3);
    wCtx.beginPath(); wCtx.moveTo(0,0); wCtx.lineTo(0,-25); wCtx.stroke();
    wCtx.restore();
  }
  wCtx.fillStyle='#5a4838'; wCtx.beginPath(); wCtx.arc(0,0,5,0,Math.PI*2); wCtx.fill();
  wCtx.restore();

  // Minimap — player-relative 400m window
  const mmW=160, mmH=100;
  mCtx.fillStyle='#080c10'; mCtx.fillRect(0,0,mmW,mmH);

  const ms  = 0.12; // pixels per metre
  const cop = copBody.getPosition();
  const ox  = mmW/2 - cop.x*ms;
  const oy  = mmH/2 + cop.y*ms;  // +cop.y so that world +Y (north) maps to canvas up

  const WIN  = Math.ceil(400/ROAD_STEP);
  const si   = Math.max(0, copRoadSeq - roadBaseSeq - WIN);
  const ei   = Math.min(roadPts.length-1, copRoadSeq - roadBaseSeq + WIN);

  mCtx.beginPath();
  for (let i=si; i<=ei; i+=4) {
    const p=roadPts[i];
    const sx=p.x*ms+ox, sy=-p.y*ms+oy;  // negate y to flip axis
    i===si ? mCtx.moveTo(sx,sy) : mCtx.lineTo(sx,sy);
  }
  mCtx.strokeStyle='#3a3530';
  mCtx.lineWidth = Math.max(4, Math.round(ROAD_HALF*2*ms));
  mCtx.stroke();

  function mmDot(body, col) {
    const p=body.getPosition();
    mCtx.beginPath(); mCtx.arc(p.x*ms+ox,-p.y*ms+oy,3,0,Math.PI*2);
    mCtx.fillStyle=col; mCtx.fill();
  }
  mmDot(copBody,'#4488ff');
  mmDot(suspBody,'#ff4422');
  for (const t of trafficArr) mmDot(t.body,'#5a4838');
}

// ═══════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════
function updateCamera(dt) {
  const pos = copBody.getPosition();
  const ang = copBody.getAngle();
  const fx  = -Math.sin(ang), fy = Math.cos(ang);

  const tPos = new THREE.Vector3(pos.x - fx*30, 38, pos.y - fy*30);
  const tLook= new THREE.Vector3(pos.x + fx*15, 3, pos.y + fy*15);

  camPos.lerp(tPos,  7*dt);
  camLook.lerp(tLook, 7*dt);
  camera.position.copy(camPos);
  camera.lookAt(camLook);
}

// ═══════════════════════════════════════════════════════
//  LIGHT BAR FLASH
// ═══════════════════════════════════════════════════════
let lbFlash=false, lbTimer=0;
function updateLightBar(dt) {
  if (!copMesh) return;
  lbTimer+=dt;
  if (lbTimer>0.25) { lbTimer=0; lbFlash=!lbFlash; }
  const lb = copMesh.userData.lightBar;
  if (!lb) return;
  const spd = Math.hypot(copBody.getLinearVelocity().x, copBody.getLinearVelocity().y);
  if (spd<0.5) { lb[0].material.emissiveIntensity=0.1; lb[1].material.emissiveIntensity=0.1; return; }
  lb[0].material.emissiveIntensity = lbFlash ? 1.2 : 0.05;
  lb[1].material.emissiveIntensity = lbFlash ? 0.05: 1.2;
}

function syncMesh(mesh, body) {
  const pos = body.getPosition();
  mesh.position.set(pos.x, 0, pos.y);
  mesh.rotation.y = -body.getAngle();
}

// ═══════════════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════════════
let lastT=0;

function gameUpdate(dt) {
  if (!locked) return;

  // Road management — extend and cull buffer
  const prevLen = roadPts.length;
  manageRoadBuffer();
  if (roadPts.length !== prevLen) updateRoadMesh();
  streamTraffic();
  streamScenery();

  // Update cop road sequence
  const copNr = findNearRoad(copBody.getPosition().x, copBody.getPosition().y, copRoadSeq);
  copRoadSeq = copNr.seq;

  // Auto-recenter steering
  if (steerCfg.recenter > 0) {
    inp.steer *= Math.max(0, 1 - steerCfg.recenter * dt);
    if (Math.abs(inp.steer) < 0.001) inp.steer = 0;
  }

  vehicleStep(copBody, inp, 1.0, 190);
  suspectAI(dt);
  for (const t of trafficArr) trafficStep(t, dt);

  physWorld.step(Math.min(dt, 1/30), 8, 3);

  syncMesh(copMesh,  copBody);
  syncMesh(suspMesh, suspBody);
  for (const t of trafficArr) syncMesh(t.mesh, t.body);

  addSkids(copBody);
  addSkids(suspBody);

  updateLightBar(dt);
  updateCamera(dt);
  updateAudio(dt);
  updateHUD(dt);
  maybeChatUpdate(dt);
  checkPIT(dt);

  timer -= dt;
  if (timer <= 0) { endGame('time_up'); return; }
  if (crashFlag)  { endGame('cop_crash'); return; }

  const nr    = findNearRoad(suspBody.getPosition().x, suspBody.getPosition().y, suspRoadSeq);
  const sv    = suspBody.getLinearVelocity();
  const sspd  = Math.hypot(sv.x, sv.y);
  const offRoad = nr.dist > ROAD_HALF + 1.5;
  if (offRoad && sspd < 2.5 && pitCooldown < 0) {
    if (pitCooldown > -5) { endGame('cop_wins'); return; }
  }
}

function countdownUpdate(dt) {
  cdTimer-=dt;
  if (cdTimer<=0 && cdCount>0) { cdCount--; cdTimer=1; }
  if (cdCount<=0 && cdTimer<=0) {
    state='playing';
    canvas_requestLock();
    const cdEl=document.getElementById('cd-overlay');
    if (cdEl) cdEl.style.display='none';
  }
  if (copBody) updateCamera(dt);
}

// ═══════════════════════════════════════════════════════
//  WORLD CONSTRUCTION
// ═══════════════════════════════════════════════════════
function buildWorld() {
  // Clear Three.js scene (lights stay)
  scene.children.filter(c=>c.type!=='DirectionalLight'&&c.type!=='AmbientLight')
    .forEach(c=>scene.remove(c));
  roadMeshDynamic = null;
  roadMarkMesh    = null;
  skidMesh        = null;
  scenery    = [];
  trafficArr = [];
  skidCount  = 0;

  buildGroundPlane();
  initRoadMesh();
  updateRoadMesh();
  buildSkidSystem();

  // Populate initial scenery
  scenerySeedSeq = 0;
  streamScenery();

  // Player cars
  copMesh  = buildCarMesh('cop');
  suspMesh = buildCarMesh('suspect');
  scene.add(copMesh, suspMesh);

  const p0  = getRoadPt(roadBaseSeq) || roadPts[0];
  const p35 = getRoadPt(roadBaseSeq + 35) || roadPts[Math.min(35, roadPts.length-1)];

  copBody  = makeCarBody(p0.x,  p0.y,  roadFwdAngle(p0,  1), 'cop');
  suspBody = makeCarBody(p35.x, p35.y, roadFwdAngle(p35, 1), 'suspect');
  copRoadSeq  = roadBaseSeq;
  suspRoadSeq = roadBaseSeq + 35;

  const sfwd = bodyFwd(suspBody);
  suspBody.setLinearVelocity(Vec2(sfwd.x*20, sfwd.y*20));

  // Initial traffic — start spawning 60 seqs ahead (past cop/suspect)
  trafficSpawnSeq = { fwd: roadBaseSeq + 60, onc: roadBaseSeq + 60 };
  streamTraffic();
}

// ═══════════════════════════════════════════════════════
//  GAME STATE MANAGEMENT
// ═══════════════════════════════════════════════════════
function startGame() {
  initAudio();
  const rawSeed=document.getElementById('seed-input').value.trim();
  seed=rawSeed ? (parseInt(rawSeed,10)||hashStr(rawSeed)) : (Math.random()*999999999|0);
  document.getElementById('seed-input').value=seed;
  rng=mkRNG(seed);

  buildPhysWorld();
  initRoad();
  buildWorld();

  timer=DIFF_SETTINGS[diff].time;
  cdCount=3; cdTimer=1;
  pitDone=false; pitRating=''; endReason=''; pitCooldown=0; crashFlag=false;
  inp.throttle=inp.brake=inp.handbrake=false; inp.steer=0;
  suspectLatShift=0;
  locked=false; chatCooldown=8;
  skidCount=0;

  if (copBody) {
    const p=copBody.getPosition();
    camPos.set(p.x-20, 38, p.y-20);
    camLook.set(p.x+10, 3, p.y+10);
  }

  state='countdown';
  document.getElementById('ov-start').classList.add('hidden');
  document.getElementById('ov-end').classList.add('hidden');
  document.getElementById('ov-pause').classList.add('hidden');
}

function endGame(reason) {
  endReason=reason;
  state='ended';
  document.exitPointerLock&&document.exitPointerLock();
  locked=false;

  if (engGain)  engGain.gain.value=0;
  if (sirenG)   sirenG.gain.value=0;
  if (screechG) screechG.gain.value=0;

  const elapsed=DIFF_SETTINGS[diff].time - timer;
  let title, col, meta;

  if (reason==='cop_wins') {
    title='PIT SUCCESS'; col='#44dd88';
    meta='Rating: '+pitRating+'\nTime: '+elapsed.toFixed(1)+'s';
    playJingle(true);
  } else if (reason==='cop_crash') {
    title='MISSION FAILED'; col='#ff4422';
    meta='Cop crashed\nTime: '+elapsed.toFixed(1)+'s';
    playJingle(false);
  } else {
    title="TIME'S UP"; col='#ff8820';
    meta='Suspect escaped\nTime: '+elapsed.toFixed(1)+'s';
    playJingle(false);
  }

  const rt=document.getElementById('result-title');
  rt.textContent=title; rt.style.color=col;
  document.getElementById('result-meta').textContent=meta+'\nSeed: '+seed;
  document.getElementById('ov-end').classList.remove('hidden');

  let secs = 3;
  const cdEl2 = document.getElementById('return-countdown');
  cdEl2.textContent = 'Returning to menu in ' + secs + 's…';
  const retInterval = setInterval(() => {
    secs--;
    if (secs > 0) {
      cdEl2.textContent = 'Returning to menu in ' + secs + 's…';
    } else {
      clearInterval(retInterval);
      document.getElementById('ov-end').classList.add('hidden');
      document.getElementById('ov-start').classList.remove('hidden');
      state = 'start';
    }
  }, 1000);
}

function hashStr(s) {
  let h=0; for (let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return Math.abs(h);
}

// ═══════════════════════════════════════════════════════
//  POINTER LOCK
// ═══════════════════════════════════════════════════════
function canvas_requestLock() {
  renderer.domElement.requestPointerLock();
}

function syncPauseSliders() {
  const s = steerCfg;
  const fmt = (v, d) => v === 0 ? 'off' : (+v).toFixed(d).replace(/\.?0+$/, '');
  document.getElementById('p-sl-sens').value    = s.sensitivity;
  document.getElementById('p-lbl-sens').textContent  = fmt(s.sensitivity, 4);
  document.getElementById('p-sl-nonlin').value   = s.nonlin;
  document.getElementById('p-lbl-nonlin').textContent = fmt(s.nonlin, 2);
  document.getElementById('p-sl-recenter').value = s.recenter;
  document.getElementById('p-lbl-recenter').textContent = s.recenter === 0 ? 'off' : fmt(s.recenter, 2);
}

document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  if (!locked && state==='playing') {
    syncPauseSliders();
    document.getElementById('ov-pause').classList.remove('hidden');
  } else if (locked) {
    document.getElementById('ov-pause').classList.add('hidden');
  }
});

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
document.addEventListener('mousemove', e => {
  if (!locked || state!=='playing') return;
  const MAX_STEER_DELTA = 0.045;
  const nlFactor = 1 + steerCfg.nonlin * inp.steer * inp.steer;
  const delta = clamp(e.movementX * steerCfg.sensitivity * nlFactor, -MAX_STEER_DELTA, MAX_STEER_DELTA);
  inp.steer = clamp(inp.steer + delta, -1, 1);
});
document.addEventListener('mousedown', e => {
  if (e.button===0) inp.throttle=true;
  if (state!=='playing' || !locked) return;
  if (e.button===2) inp.brake=true;
  if (e.button===1) { e.preventDefault(); inp.handbrake=true; }
});
document.addEventListener('mouseup', e => {
  if (e.button===0) inp.throttle=false;
  if (e.button===2) inp.brake=false;
  if (e.button===1) inp.handbrake=false;
});
renderer.domElement.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key==='Escape' && state==='playing') {
    if (locked) document.exitPointerLock();
    else renderer.domElement.requestPointerLock();
  }
});

// ═══════════════════════════════════════════════════════
//  COUNTDOWN OVERLAY
// ═══════════════════════════════════════════════════════
function drawCountdown(ts) {
  if (state!=='countdown') return;
  let cdEl = document.getElementById('cd-overlay');
  if (!cdEl) {
    cdEl=document.createElement('div');
    cdEl.id='cd-overlay';
    cdEl.style.cssText='position:fixed;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;pointer-events:none;font-family:monospace;font-weight:900;text-shadow:0 0 40px currentColor;';
    document.body.appendChild(cdEl);
  }
  cdEl.style.display='flex';
  const label = cdCount>0 ? cdCount : 'GO!';
  const col   = cdCount>0 ? '#e8a020' : '#44dd88';
  cdEl.innerHTML=`<span style="font-size:110px;color:${col};letter-spacing:.12em">${label}</span>`;
  if (state!=='countdown') cdEl.style.display='none';
}

function loopEx(ts) {
  requestAnimationFrame(loopEx);
  const dt = Math.min((ts-lastT)/1000, 0.05); lastT=ts;

  if (state==='playing') gameUpdate(dt);
  else if (state==='countdown') { countdownUpdate(dt); drawCountdown(ts); }

  renderer.render(scene, camera);
}
