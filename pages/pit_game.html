<style>

<script type="module">
'use strict';
import * as THREE   from 'three';
import * as CANNON  from 'cannon-es';

// ═══════════════════════════════════════════════════════
//  THREE.JS SCENE SETUP
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.id = 'three-canvas';
document.body.prepend(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x5a7088);
scene.fog = new THREE.Fog(0x5a7088, 180, 480);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 600);
camera.position.set(0, 40, 35);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

const ambient = new THREE.AmbientLight(0x8898aa, 1.6);
const sun     = new THREE.DirectionalLight(0xfff5e0, 2.8);
sun.position.set(60, 100, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 600;
sun.shadow.camera.left = sun.shadow.camera.bottom = -200;
sun.shadow.camera.right = sun.shadow.camera.top = 200;
scene.add(ambient, sun);

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const CAR_W   = 2.2, CAR_L = 4.5, CAR_H = 1.3;
const ROAD_HALF = 7;
const LANE_HALF = 3.5;
const WHEELBASE = 2.6;
const MAX_STEER = 0.46;
const ROAD_STEP = 2;

const ROAD_BUFFER_AHEAD  = 1200;  // m ahead of player
const ROAD_BUFFER_BEHIND = 600;   // m behind player
const SCENERY_SKIP       = 10;    // road points between scenery placements
const ROAD_MESH_CAP      = 1100;  // max pts in dynamic road mesh buffer

const DIFF_SETTINGS = {
  //          time  speed  traffic  evasion  angDamp  spdMulMax
  // angDamp: low = spins easily (easy to PIT), high = resists spin (hard to PIT)
  // spdMulMax: per-seed speed range; higher = more unpredictable on hard
  easy:   { time:90, aiSpd:0.65, traffic:8,  evasion:0.25, angDamp:0.12, spdMulMax:0.10 },
  normal: { time:60, aiSpd:1.00, traffic:14, evasion:0.60, angDamp:0.30, spdMulMax:0.45 },
  hard:   { time:45, aiSpd:1.35, traffic:20, evasion:0.90, angDamp:0.55, spdMulMax:0.70 },
};
const CHATTER_LINES = [
  'All units — suspect is running','PIT manoeuvre authorised',
  'Watch for civilian traffic','Cobra 1, I have the visual',
  'Requesting backup — 10-80','Stand by for PIT attempt',
  'Suspect heading northbound','Stay on him, don\'t lose him',
];
const TRAFFIC_COLS = [0xc8a87e,0x8a3535,0x35558a,0x7a8a35,0x8a357a,0x3a7a7a,0xaaaaaa,0x6a503a];

// ═══════════════════════════════════════════════════════
//  PRNG — mulberry32
// ═══════════════════════════════════════════════════════
function mkRNG(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════════════
//  MATH HELPERS
// ═══════════════════════════════════════════════════════
const clamp = (v,a,b) => v<a?a:v>b?b:v;
const lerp  = (a,b,t) => a+(b-a)*t;
function angleDiff(a,b){ let d=((a-b)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI; return d; }

// Extract Y-axis rotation angle from a cannon-es/Three.js quaternion
function getYAngle(q) {
  return Math.atan2(2*(q.w*q.y + q.x*q.z), 1 - 2*(q.y*q.y + q.z*q.z));
}
// Forward and right vectors in XZ plane (road coord space) from a cannon-es body.
// Returns same {x,y} convention as old Planck helpers so AI code is unchanged.
function bodyFwd(body) {
  const a = -getYAngle(body.quaternion);
  return { x: -Math.sin(a), y: Math.cos(a) };
}
function bodyRt(body) {
  const a = -getYAngle(body.quaternion);
  return { x: Math.cos(a), y: Math.sin(a) };
}
// Convert Planck-convention angle θ to cannon-es Y-Euler (negated)
function roadFwdAngle_3D(theta) { return -theta; }

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let state   = 'start';
let diff    = 'normal';
let seed    = 0;
let rng     = null;
let timer   = 60, cdCount = 3, cdTimer = 0;
let pitDone = false, pitRating = '', endReason = '';
let locked  = false;
let sirenT  = 0, sirenPhase = 0;

let roadPts    = [];  // sliding window [{x,y,tx,ty,zone}]
let scenery    = [];  // [{mesh, body}]
let trafficArr = [];  // [{mesh, body, spd, lane, roadSeq}]
let skidLines  = [];
let skidGeo    = null;

// Infinite road generation state
let genX = 0, genY = 0, genAngle = 0;
let genCurvature = 0, genCurveTimer = 0;
let genZone = 'country', genZoneTimer = 0;
let roadBaseSeq = 0, roadGenSeq = 0;

// Road tracking (sequence numbers)
let copRoadSeq = 0, suspRoadSeq = 0;
let trafficSpawnSeq = { fwd: 0, onc: 0 };
let scenerySeedSeq = 0;
let suspectLatShift = 0;

// Dynamic road mesh
let roadPosBuf = null, roadMeshDynamic = null, roadMarkMesh = null;

// World objects — cannon-es
let cannonWorld = null, groundMat = null, carMat = null;
let copBody = null, suspBody = null;
let copMesh = null, suspMesh = null;
let copLights = null;

const camPos  = new THREE.Vector3();
const camLook = new THREE.Vector3();

const inp = { throttle:false, brake:false, handbrake:false, steer:0 };
const steerCfg   = { sensitivity: 0.0007, nonlin: 0.2, recenter: 0.6 };
const trafficCfg = { density: 1.0 };

let suspStopTimer      = 0;    // seconds suspect has been nearly stopped after a PIT
let suspSpdMul         = 1.0;  // per-seed speed multiplier for the suspect
let suspEngineDisabled = false; // set true when PIT condition is met
let pitTrackActive     = false; // tracking suspect rotation after a PIT contact
let pitAccumRot        = 0;    // accumulated suspect Y rotation (radians) since contact
let pitLastAngle       = 0;    // last frame's suspect Y angle for delta computation
let suspOvertakeTimer  = 0;        // seconds remaining in active overtake pass

const SKID_MAX = 2000;
const skidPositions = new Float32Array(SKID_MAX * 3);
let   skidCount = 0;
let   skidMesh  = null;

// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
let aCtx, masterGain, engOsc, engGain, sirenG, sirenO1, sirenO2, screechG;

function initAudio() {
  if (aCtx) return;
  aCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = aCtx.createGain(); masterGain.gain.value = 0; masterGain.connect(aCtx.destination);

  const comp = aCtx.createDynamicsCompressor();
  comp.threshold.value=-18; comp.knee.value=12; comp.ratio.value=4;
  comp.attack.value=0.003; comp.release.value=0.25;
  masterGain.connect(comp); comp.connect(aCtx.destination); masterGain.disconnect(aCtx.destination);
  masterGain.connect(comp);

  engOsc = aCtx.createOscillator(); engOsc.type='sawtooth'; engOsc.frequency.value=85;
  engGain = aCtx.createGain(); engGain.gain.value=0;
  engOsc.connect(engGain); engGain.connect(masterGain); engOsc.start();

  sirenO1=aCtx.createOscillator(); sirenO1.type='sine'; sirenO1.frequency.value=660;
  sirenO2=aCtx.createOscillator(); sirenO2.type='sine'; sirenO2.frequency.value=770;
  sirenG=aCtx.createGain(); sirenG.gain.value=0;
  sirenO1.connect(sirenG); sirenO2.connect(sirenG); sirenG.connect(masterGain);
  sirenO1.start(); sirenO2.start();

  screechG=aCtx.createGain(); screechG.gain.value=0;
  const sbuf=aCtx.createBuffer(1,aCtx.sampleRate,aCtx.sampleRate);
  const sd=sbuf.getChannelData(0); for(let i=0;i<sd.length;i++) sd[i]=Math.random()*2-1;
  const ssrc=aCtx.createBufferSource(); ssrc.buffer=sbuf; ssrc.loop=true;
  const sflt=aCtx.createBiquadFilter(); sflt.type='bandpass'; sflt.frequency.value=900;
  ssrc.connect(sflt); sflt.connect(screechG); screechG.connect(masterGain); ssrc.start();
}

function playImpact(freq, intensity) {
  if (!aCtx) return;
  const o=aCtx.createOscillator(), g=aCtx.createGain();
  o.type='sine'; o.connect(g); g.connect(masterGain);
  const t=aCtx.currentTime;
  o.frequency.setValueAtTime(freq*2.5,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(freq,8),t+0.12);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(intensity,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.85);
  o.start(t); o.stop(t+1.0);
}

function playJingle(win) {
  if (!aCtx) return;
  const notes = win ? [261,330,392,523] : [392,349,311,261];
  notes.forEach((f,i) => {
    const o=aCtx.createOscillator(), g=aCtx.createGain();
    o.type='sine'; o.connect(g); g.connect(masterGain);
    const t=aCtx.currentTime+i*0.13;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.3,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    o.frequency.value=f; o.start(t); o.stop(t+0.3);
  });
}

function updateAudio(dt) {
  if (!aCtx || !copBody) return;
  const vel = copBody.velocity;
  const spd = Math.hypot(vel.x, vel.z);
  engOsc.frequency.value = 75 + spd * 3.5;
  engGain.gain.value += ((inp.throttle ? 0.10 + spd*0.0005 : 0.03) - engGain.gain.value) * 0.12;

  sirenT += dt;
  if (sirenT > 0.42) { sirenT=0; sirenPhase^=1; sirenG.gain.value=spd>1 ? (sirenPhase?0.13:0.07) : 0; }

  const rt  = bodyRt(copBody);
  const lat = Math.abs(vel.x*rt.x + vel.z*rt.y);
  screechG.gain.value += (clamp((lat-2)/9,0,1)*(inp.handbrake?1.4:1)*0.16 - screechG.gain.value)*0.14;
}

// ═══════════════════════════════════════════════════════
//  INFINITE ROAD GENERATION
// ═══════════════════════════════════════════════════════
function getRoadPt(seq) {
  const i = seq - roadBaseSeq;
  if (i < 0 || i >= roadPts.length) return null;
  return roadPts[i];
}

// Planck angle for a car facing along road tangent in given lane direction
// lane=+1 → forward, lane=-1 → oncoming (backward along road)
function roadFwdAngle(p, lane) {
  return Math.atan2(-p.tx * lane, p.ty * lane);
}

function findNearRoad(x, y, hintSeq) {
  const WINDOW = 80;
  const hi = clamp(hintSeq - roadBaseSeq, 0, roadPts.length - 1);
  let best = hi, bestD = Infinity;
  for (let di = -WINDOW; di <= WINDOW; di++) {
    const ai = hi + di;
    if (ai < 0 || ai >= roadPts.length) continue;
    const p = roadPts[ai];
    const d = Math.hypot(x - p.x, y - p.y);
    if (d < bestD) { bestD = d; best = ai; }
  }
  return { seq: best + roadBaseSeq, dist: bestD };
}

// Get lane-centre target point lookaheadM ahead for AI steering
// lane=+1 looks in +seq direction (forward), lane=-1 looks in -seq direction (oncoming)
function laneLookAhead(hintSeq, lane, lookaheadM) {
  const ahead = Math.round(lookaheadM / ROAD_STEP);
  const targetSeq = clamp(hintSeq + lane * ahead, roadBaseSeq, roadBaseSeq + roadPts.length - 1);
  const p = getRoadPt(targetSeq);
  if (!p) return null;
  // Camera right = world -X, so forward lane (+1) sits on world -X = player's right
  return { x: p.x - p.ty * LANE_HALF * lane, y: p.y + p.tx * LANE_HALF * lane, p };
}

function initRoad() {
  roadPts = [];
  roadBaseSeq = 0; roadGenSeq = 0;
  genX = 0; genY = 0; genAngle = 0;
  genCurvature = 0; genCurveTimer = 0;
  genZone = 'country'; genZoneTimer = 0;
  extendRoadTo(Math.ceil((ROAD_BUFFER_AHEAD + 300) / ROAD_STEP));
}

function extendRoadTo(targetSeq) {
  while (roadGenSeq < targetSeq) {
    genCurveTimer -= ROAD_STEP;
    if (genCurveTimer <= 0) {
      genCurvature  = (rng() - 0.5) * 0.006;
      genCurveTimer = 120 + rng() * 300;
    }
    genZoneTimer -= ROAD_STEP;
    if (genZoneTimer <= 0) {
      genZone      = rng() < 0.25 ? 'city' : 'country';
      genZoneTimer = 350 + rng() * 650;
    }
    genAngle += genCurvature * ROAD_STEP;
    genX     += Math.sin(genAngle) * ROAD_STEP;
    genY     += Math.cos(genAngle) * ROAD_STEP;
    roadPts.push({ x:genX, y:genY, tx:Math.sin(genAngle), ty:Math.cos(genAngle), zone:genZone });
    roadGenSeq++;
  }
}

function manageRoadBuffer() {
  const aheadNeeded = copRoadSeq + Math.ceil(ROAD_BUFFER_AHEAD / ROAD_STEP);
  if (roadGenSeq < aheadNeeded) extendRoadTo(aheadNeeded);

  const cullBefore = copRoadSeq - Math.ceil(ROAD_BUFFER_BEHIND / ROAD_STEP);
  if (cullBefore > roadBaseSeq + 100) {
    const cullCount = cullBefore - roadBaseSeq;
    roadPts.splice(0, cullCount);
    roadBaseSeq += cullCount;
  }
}

function initRoadMesh() {
  const VERTS = ROAD_MESH_CAP * 2;

  roadPosBuf = new Float32Array(VERTS * 3);
  const geo  = new THREE.BufferGeometry();
  const posAttr = new THREE.BufferAttribute(roadPosBuf, 3);
  posAttr.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position', posAttr);

  // Upward normals — road is flat in XZ plane, always lit correctly from above
  const normBuf = new Float32Array(VERTS * 3);
  for (let i = 1; i < normBuf.length; i += 3) normBuf[i] = 1.0;
  geo.setAttribute('normal', new THREE.BufferAttribute(normBuf, 3));

  const iArr = new Uint32Array((ROAD_MESH_CAP - 1) * 6);
  for (let i = 0; i < ROAD_MESH_CAP - 1; i++) {
    const a=i*2, b=a+1, c=a+2, d=a+3;
    iArr.set([a,c,b, b,c,d], i*6);  // CCW winding for upward-facing normal
  }
  geo.setIndex(new THREE.BufferAttribute(iArr, 1));
  geo.setDrawRange(0, 0);

  roadMeshDynamic = new THREE.Mesh(geo, MAT.road);
  roadMeshDynamic.receiveShadow = true;
  scene.add(roadMeshDynamic);

  // Lane marking mesh (dashed centre line)
  const markBuf  = new Float32Array(VERTS * 3);
  const markGeo  = new THREE.BufferGeometry();
  const markAttr = new THREE.BufferAttribute(markBuf, 3);
  markAttr.setUsage(THREE.DynamicDrawUsage);
  markGeo.setAttribute('position', markAttr);
  const markNorm = new Float32Array(VERTS * 3);
  for (let i = 1; i < markNorm.length; i += 3) markNorm[i] = 1.0;
  markGeo.setAttribute('normal', new THREE.BufferAttribute(markNorm, 3));
  const mIdx = new Uint32Array((ROAD_MESH_CAP - 1) * 6);
  for (let i = 0; i < ROAD_MESH_CAP - 1; i++) {
    const a=i*2, b=a+1, c=a+2, d=a+3;
    mIdx.set([a,c,b, b,c,d], i*6);
  }
  markGeo.setIndex(new THREE.BufferAttribute(mIdx, 1));
  markGeo.setDrawRange(0, 0);
  roadMarkMesh = new THREE.Mesh(markGeo, MAT.marking);
  roadMarkMesh.renderOrder = 1;
  scene.add(roadMarkMesh);
}

function updateRoadMesh() {
  if (!roadMeshDynamic) return;
  const N   = Math.min(roadPts.length, ROAD_MESH_CAP);
  const pos = roadPosBuf;
  const markPos = roadMarkMesh.geometry.attributes.position.array;

  const dashLen = 8, dashGap = 12, dashStep = dashLen + dashGap;
  let accum = 0;

  for (let i = 0; i < N; i++) {
    const p  = roadPts[i];
    const hw = ROAD_HALF + 0.5;
    const vi = i * 6;
    pos[vi]   = p.x - p.ty*hw; pos[vi+1] = 0.08; pos[vi+2] = p.y + p.tx*hw;
    pos[vi+3] = p.x + p.ty*hw; pos[vi+4] = 0.08; pos[vi+5] = p.y - p.tx*hw;

    // Dashed centre marking — degenerate quad when in gap (zero-area → invisible)
    const inDash = (accum % dashStep) < dashLen;
    const mw = 0.18;
    if (inDash) {
      markPos[vi]   = p.x - p.ty*mw; markPos[vi+1] = 0.13; markPos[vi+2] = p.y + p.tx*mw;
      markPos[vi+3] = p.x + p.ty*mw; markPos[vi+4] = 0.13; markPos[vi+5] = p.y - p.tx*mw;
    } else {
      markPos[vi]   = p.x; markPos[vi+1] = 0.13; markPos[vi+2] = p.y;
      markPos[vi+3] = p.x; markPos[vi+4] = 0.13; markPos[vi+5] = p.y;
    }
    if (i > 0) accum += ROAD_STEP;
  }

  roadMeshDynamic.geometry.attributes.position.needsUpdate = true;
  roadMeshDynamic.geometry.setDrawRange(0, Math.max(0, (N-1)*6));
  roadMarkMesh.geometry.attributes.position.needsUpdate = true;
  roadMarkMesh.geometry.setDrawRange(0, Math.max(0, (N-1)*6));
}

//  THRUSTER PHYSICS
// ═══════════════════════════════════════════════════════

// Propel a box car using direct force + bicycle-model yaw rate.
// Lateral grip, longitudinal thrust, and steering are all independent.
function applyThrusters(body, input, engineForce, maxSpeedKph, hintRoadSeq) {
  body.wakeUp();

  const theta = -getYAngle(body.quaternion);
  const fwdX = -Math.sin(theta), fwdZ = Math.cos(theta);
  const rtX  =  Math.cos(theta), rtZ  = Math.sin(theta);

  const nr = findNearRoad(body.position.x, body.position.z, hintRoadSeq || 0);
  const onRoad = nr.dist < ROAD_HALF + 1.5;
  const pitLoose = (body === suspBody && pitTrackActive);
  const GRIP = input.handbrake ? 0.8
             : pitLoose        ? 1.5
             : onRoad          ? 16
             : 4;

  // Damp lateral (sideways) velocity each frame
  const vel = body.velocity;
  const latV = vel.x * rtX + vel.z * rtZ;
  body.force.x -= rtX * latV * body.mass * GRIP;
  body.force.z -= rtZ * latV * body.mass * GRIP;

  const fwdSpd = vel.x * fwdX + vel.z * fwdZ;
  const curSpd = Math.hypot(vel.x, vel.z);
  const maxSpd = maxSpeedKph / 3.6;

  // Longitudinal thrust along body's current forward axis.
  // Factor of 2 matches the old 4-thruster model (2 front + 2 rear each at engineForce/2).
  if (input.throttle && curSpd < maxSpd) {
    body.force.x += fwdX * engineForce * 2;
    body.force.z += fwdZ * engineForce * 2;
  } else if (input.brake) {
    // RMB = reverse/brake: stronger thrust, higher speed cap for snappier feel
    const MAX_REV = 30 / 3.6;
    if (fwdSpd > -MAX_REV) {
      body.force.x -= fwdX * engineForce * 2.5;
      body.force.z -= fwdZ * engineForce * 2.5;
    }
  }

  // Bicycle-model steering: drive yaw rate toward kinematic target.
  // Skipped during PIT spin so collision angular momentum accumulates freely.
  // In reverse (fwdSpd < 0) the formula naturally inverts turn direction.
  // Extra yaw boost applied in reverse so it steers as crisply as forward.
  if (!pitLoose) {
    const steerRad = input.steer * MAX_STEER;
    const speedFactor = Math.min(Math.abs(fwdSpd) / 3.0, 1.0);
    const MAX_YAW = 2.5;
    const raw = speedFactor > 0.05 ? -fwdSpd * Math.tan(steerRad) / WHEELBASE : 0;
    // In reverse, boost yaw authority 3× and widen cap; forward uses normal ±MAX_YAW
    const reversing = fwdSpd < -0.5;
    const targetAngVel = reversing
      ? clamp(raw * 3.0, -MAX_YAW * 2, MAX_YAW * 2)
      : clamp(raw, -MAX_YAW, MAX_YAW);
    body.angularVelocity.y += (targetAngVel - body.angularVelocity.y) * 0.4;
  }
}

let copArrows = [], suspArrows = [];

function makeDebugArrows(frontCol, rearCol) {
  const arr = [];
  for (let i = 0; i < 4; i++) {
    const a = new THREE.ArrowHelper(
      new THREE.Vector3(0, 0, 1), new THREE.Vector3(), 1,
      i < 2 ? frontCol : rearCol, 0.5, 0.25
    );
    a.visible = false;
    scene.add(a);
    arr.push(a);
  }
  return arr;
}

function updateDebugArrows(arrows, body, input, engineForce, maxSpeedKph) {
  if (!arrows.length) return;
  const theta = -getYAngle(body.quaternion);
  const fwdX = -Math.sin(theta), fwdZ = Math.cos(theta);
  const rtX  =  Math.cos(theta), rtZ  = Math.sin(theta);
  const steerRad = input.steer * MAX_STEER;
  const ts = theta + steerRad;   // +steerRad: arrows correctly point toward intended turn direction
  const sfwdX = -Math.sin(ts), sfwdZ = Math.cos(ts);

  const vel = body.velocity;
  const curSpd = Math.hypot(vel.x, vel.z);
  const maxSpd = maxSpeedKph / 3.6;

  let thrustMag = 0;
  if (input.throttle && curSpd < maxSpd) thrustMag =  engineForce;
  else if (input.brake)                  thrustMag = -engineForce * 0.6;

  const fz = CAR_L * 0.38, rz = -CAR_L * 0.38, sx = CAR_W * 0.42;
  const cx = body.position.x, cy = body.position.y + CAR_H * 0.55, cz = body.position.z;

  const positions = [
    [cx + fwdX*fz - rtX*sx, cy, cz + fwdZ*fz - rtZ*sx],
    [cx + fwdX*fz + rtX*sx, cy, cz + fwdZ*fz + rtZ*sx],
    [cx + fwdX*rz - rtX*sx, cy, cz + fwdZ*rz - rtZ*sx],
    [cx + fwdX*rz + rtX*sx, cy, cz + fwdZ*rz + rtZ*sx],
  ];
  const sign = thrustMag >= 0 ? 1 : -1;
  const dirs = [
    [sfwdX * sign, sfwdZ * sign],
    [sfwdX * sign, sfwdZ * sign],
    [fwdX  * sign, fwdZ  * sign],
    [fwdX  * sign, fwdZ  * sign],
  ];

  const F = Math.abs(thrustMag * 0.5);
  const arrowLen = Math.min(F * 0.004, 7);

  const _dir = new THREE.Vector3();
  for (let i = 0; i < 4; i++) {
    if (F < 5 || arrowLen < 0.05) { arrows[i].visible = false; continue; }
    arrows[i].visible = true;
    arrows[i].position.set(positions[i][0], positions[i][1], positions[i][2]);
    _dir.set(dirs[i][0], 0, dirs[i][1]);
    if (_dir.lengthSq() > 0.0001) {
      _dir.normalize();
      arrows[i].setDirection(_dir);
    }
    arrows[i].setLength(arrowLen, Math.min(arrowLen * 0.3, 1.0), Math.min(arrowLen * 0.15, 0.5));
  }
}

// ═══════════════════════════════════════════════════════
function closestCarAhead(body, lane, cars) {
  const pos = body.position;
  const fwd = bodyFwd(body);
  let minDist = Infinity;
  for (const c of cars) {
    if (c.body === body) continue;
    if (c.lane !== lane) continue;
    const cp = c.body.position;
    const dx = cp.x - pos.x, dy = cp.z - pos.z;
    const ahead = dx*fwd.x + dy*fwd.y;
    if (ahead < 1 || ahead > 60) continue;
    const lat = Math.abs(dx*(-fwd.y) + dy*fwd.x);
    if (lat < CAR_W + 1.5) minDist = Math.min(minDist, ahead);
  }
  return minDist;
}

// True if no lane-(-1) traffic car is within clearDist metres of pos
function isOncomingClear(pos, clearDist) {
  for (const c of trafficArr) {
    if (c.lane !== -1) continue;
    if (Math.hypot(c.body.position.x - pos.x, c.body.position.z - pos.z) < clearDist) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════════════
//  COP ROAD-FOLLOW (used during countdown so cop stays on road)
// ═══════════════════════════════════════════════════════
function copRoadFollowAI() {
  const pos = copBody.position;
  const vel = copBody.velocity;
  const spd = Math.hypot(vel.x, vel.z);

  const nr = findNearRoad(pos.x, pos.z, copRoadSeq);
  copRoadSeq = nr.seq;

  const tgt = laneLookAhead(copRoadSeq, 1, 14 + spd * 0.4);
  if (!tgt) return;

  const dx = tgt.x - pos.x, dy = tgt.y - pos.z;
  const wantAngle = Math.atan2(-dx, dy);
  const curAngle  = -getYAngle(copBody.quaternion);
  const steer = clamp(angleDiff(wantAngle, curAngle) * 2.0, -1, 1);
  applyThrusters(copBody,
    { throttle: true, brake: false, handbrake: false, steer },
    1800, 120, copRoadSeq);
}

  const nr = findNearRoad(pos.x, pos.z, suspRoadSeq);
  suspRoadSeq = nr.seq;

  // ── Overtake decision ────────────────────────────────────────────────────
  // Use road-sequence comparison so detection works regardless of suspect lane.
  // Tight window (8 seqs = 16 m) → suspect waits until nearly on the bumper,
  // then swerves aggressively — looks urgent and cinematic.
  let blockerSeq = -1;
  for (const c of trafficArr) {
    if (c.lane !== 1) continue;
    const seqDiff = c.roadSeq - suspRoadSeq;
    if (seqDiff > 10 && seqDiff < 15) {           // 0–16 m ahead — last moment
      if (blockerSeq === -1 || c.roadSeq < blockerSeq) blockerSeq = c.roadSeq;
    }
  }
  const oncomingClear = isOncomingClear(pos, 60);

  // Initiate pass when a blocker is detected and the other lane is clear
  if (blockerSeq !== -1 && oncomingClear && suspOvertakeTimer <= 0) {
    suspOvertakeTimer = 5.0;
  }
  // Abort immediately if oncoming traffic appears
  if (!oncomingClear) suspOvertakeTimer = 0;
  // Once we've road-seq-passed the blocker, allow early return with a small buffer
  if (suspOvertakeTimer > 0) {
    suspOvertakeTimer -= dt;
    if (blockerSeq === -1) suspOvertakeTimer = Math.min(suspOvertakeTimer, 0.8);
  }

  // suspectLatShift: 0 = own lane, -1 = fully in oncoming lane
  const targetLatShift = suspOvertakeTimer > 0 ? -1.0 : 0.0;
  // Very fast lerp (~0.15 s to full lane change) for maniac urgency
  suspectLatShift += (targetLatShift - suspectLatShift) * Math.min(8 * dt, 1);

  // ── Road-following target ─────────────────────────────────────────────────
  // Short lookahead while changing lanes → steep angle → full steer input
  const lookM = suspOvertakeTimer > 0 ? 10 + spd * 0.15 : 18 + spd * 0.4;
  const tgt   = laneLookAhead(suspRoadSeq, 1, lookM);
  if (!tgt) return;
  const tp = tgt.p;
  const sx = tgt.x - tp.ty * suspectLatShift * LANE_HALF * 2;
  const sy = tgt.y + tp.tx * suspectLatShift * LANE_HALF * 2;

  const dx = sx - pos.x, dy = sy - pos.z;
  const wantAngle = Math.atan2(-dx, dy);
  const curAngle  = -getYAngle(suspBody.quaternion);
  const headingErr = angleDiff(wantAngle, curAngle);
  // High gain (3.0) for aggressive, snappy steering toward offset target
  let steer = clamp(headingErr * 3.0, -1, 1);

  const suspTopSpd = 38 * ds.aiSpd * suspSpdMul;
  const suspForce  = 1200 * ds.aiSpd * suspSpdMul;

  if (suspEngineDisabled) {
    applyThrusters(suspBody, { throttle:false, brake:false, handbrake:false, steer:0 },
                   0, suspTopSpd * 3.6, suspRoadSeq);
    return;
  }

  const aidInp = { throttle: true, brake: false, handbrake: false, steer };

  // Emergency brake only when jammed behind a blocker and not yet overtaking
  if (blockerSeq !== -1 && suspOvertakeTimer <= 0) {
    const distM = (blockerSeq - suspRoadSeq) * ROAD_STEP;
    if (distM < 12) { aidInp.throttle = false; aidInp.brake = true; }
  }

  // ── Off-road / post-PIT recovery ─────────────────────────────────────────
  // If heading is badly wrong (>80°) AND speed is low, the bicycle model
  // produces near-zero yaw (it's speed-dependent). Force-spin the body
  // directly so the suspect can recover even from a dead stop.
  if (Math.abs(headingErr) > Math.PI * 0.45 && spd < 6) {
    suspBody.angularVelocity.y = clamp(-headingErr * 2.0, -2.5, 2.5);
    if (spd > 1.5) { aidInp.throttle = false; } // slow down so spin takes effect
  }
  // If significantly off-road, override target to steer back to nearest road point
  if (nr.dist > ROAD_HALF + 4 && Math.abs(headingErr) < Math.PI * 0.5) {
    const rp = getRoadPt(suspRoadSeq);
    if (rp) {
      const rx = rp.x - pos.x, ry = rp.y - pos.z;
      const recovAngle = Math.atan2(-rx, ry);
      steer = clamp(angleDiff(recovAngle, curAngle) * 3.0, -1, 1);
      aidInp.steer = steer;
    }
  }

  // Brake on tight bend ahead
  const bSeq = suspRoadSeq + Math.round(10 / ROAD_STEP);
  const bp   = getRoadPt(bSeq);
  if (bp && !aidInp.brake) {
    const bAngle = Math.atan2(-(bp.x - pos.x), bp.y - pos.z);
    if (Math.abs(angleDiff(bAngle, curAngle)) > 0.45 && spd > suspTopSpd * 0.55) {
      aidInp.brake = true; aidInp.throttle = false;
    }
  }
  if (spd > suspTopSpd) aidInp.throttle = false;

  applyThrusters(suspBody, aidInp, suspForce, suspTopSpd * 3.6, suspRoadSeq);
}

// ═══════════════════════════════════════════════════════
//  TRAFFIC AI
// ═══════════════════════════════════════════════════════
function trafficStep(car, dt) {
  const pos = car.body.position;
  const vel = car.body.velocity;
  const spd = Math.hypot(vel.x, vel.z);

  const nr = findNearRoad(pos.x, pos.z, car.roadSeq);
  car.roadSeq = nr.seq;

  const lookM = 12 + spd * 0.35;
  const tgt   = laneLookAhead(car.roadSeq, car.lane, lookM);
  if (!tgt) return;

  // Passing: shift toward shoulder when car ahead is close
  if (car.latShift === undefined) car.latShift = 0;
  const aheadDist = closestCarAhead(car.body, car.lane, trafficArr);
  const wantShift = aheadDist < 30 ? 1.0 : 0.0;
  car.latShift += (wantShift - car.latShift) * clamp(2 * dt, 0, 1);

  const tp = tgt.p;
  const shiftScale = ROAD_HALF - LANE_HALF - 0.5;
  const sx = tgt.x - tp.ty * car.latShift * shiftScale * car.lane;
  const sy = tgt.y + tp.tx * car.latShift * shiftScale * car.lane;

  const dx  = sx - pos.x, dy = sy - pos.z;
  const wa  = Math.atan2(-dx, dy);
  const err = angleDiff(wa, -getYAngle(car.body.quaternion));

  const tooClose = aheadDist < 12;
  const ainp = {
    throttle: !tooClose && spd < car.spd * 1.05,
    brake:    tooClose || spd > car.spd * 1.1,
    handbrake: false,
    steer:    clamp(err * 1.2, -0.6, 0.6)   // gentler steer → less yaw-induced drag
  };
  applyThrusters(car.body, ainp, 1200, car.spd * 3.6, car.roadSeq);
  updateDebugArrows(car.arrows, car.body, ainp, 1200, car.spd * 3.6);
}

// ═══════════════════════════════════════════════════════
//  STREAMING — TRAFFIC
// ═══════════════════════════════════════════════════════
function trafficSpawnProb() {
  return DIFF_SETTINGS[diff].traffic * trafficCfg.density /
         ((ROAD_BUFFER_AHEAD + ROAD_BUFFER_BEHIND) / ROAD_STEP * 2);
}

function spawnTrafficCar(seq, lane) {
  const p = getRoadPt(seq); if (!p) return;
  const lx    = p.x - p.ty * LANE_HALF * lane;
  const ly    = p.y + p.tx * LANE_HALF * lane;
  const angle = roadFwdAngle(p, lane);
  const tb    = makeBoxCar(lx, ly, angle, 'traffic');
  const tm    = buildCarMesh('traffic');
  tm.children.forEach(c => {
    if (c.material && c.material !== MAT.wheel && c.material !== MAT.glass) {
      c.material = c.material.clone();
      c.material.color.setHex(TRAFFIC_COLS[Math.floor(rng() * TRAFFIC_COLS.length)]);
    }
  });
  scene.add(tm);
  const tspd = 10 + rng() * 18;
  const arrows = makeTrafficArrows();
  trafficArr.push({ mesh:tm, body:tb, spd:tspd, lane, roadSeq:seq, arrows });
}

function streamTraffic() {
  const prob = trafficSpawnProb();
  const fwdTarget = roadGenSeq - 10;

  while (trafficSpawnSeq.fwd < fwdTarget) {
    const seq = trafficSpawnSeq.fwd;
    if (getRoadPt(seq) && rng() < prob) spawnTrafficCar(seq, 1);
    trafficSpawnSeq.fwd++;
  }
  while (trafficSpawnSeq.onc < fwdTarget) {
    const seq = trafficSpawnSeq.onc;
    if (getRoadPt(seq) && rng() < prob) spawnTrafficCar(seq, -1);
    trafficSpawnSeq.onc++;
  }

  // Cull traffic far behind player
  const cullSeq = copRoadSeq - Math.ceil(ROAD_BUFFER_BEHIND / ROAD_STEP) - 80;
  for (let i = trafficArr.length - 1; i >= 0; i--) {
    const t = trafficArr[i];
    if (t.roadSeq < cullSeq) {
      scene.remove(t.mesh);
      t.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); });
      try { cannonWorld.removeBody(t.body); } catch(e) {}
      if (t.arrows) removeArrows(t.arrows);
      trafficArr.splice(i, 1);
    }
  }
}

// ═══════════════════════════════════════════════════════
//  STREAMING — SCENERY
// ═══════════════════════════════════════════════════════
function tryPlaceScenery(p) {
  for (const side of [-1, 1]) {
    // minOff accounts for road half-width plus max building half-depth so nothing
    // can overlap the road surface regardless of building size or road curvature.
    const minOff = ROAD_HALF + (p.zone === 'city' ? 22 : 12);
    const maxOff = ROAD_HALF + (p.zone === 'city' ? 70 : 80);
    const off   = minOff + rng() * (maxOff - minOff);
    // Jitter along the road tangent only — perpendicular distance stays exactly `off`.
    const along = (rng() - 0.5) * 14;
    const sx = p.x + p.ty * off * side + p.tx * along;
    const sy = p.y - p.tx * off * side + p.ty * along;

    if (p.zone === 'country') {
      if (rng() < 0.75) {
        const h    = 3 + rng() * 4;
        const mesh = buildTree(sx, sy, h);
        scene.add(mesh);
        const body = makeStaticCircle(sx, sy, h * 0.4);
        scenery.push({ mesh, body });
      } else {
        const w=7+rng()*6, d=6+rng()*5, h=3+rng()*2;
        const col=new THREE.Color().setHSL(0.08+rng()*0.05, 0.2+rng()*0.1, 0.28+rng()*0.12).getHex();
        const mesh = buildBuilding(sx, sy, w, d, h, col);
        scene.add(mesh);
        const body = makeStaticBody(sx, sy, w/2, d/2);
        scenery.push({ mesh, body });
      }
    } else {
      const w=12+rng()*24, d=10+rng()*18, h=5+rng()*15;
      const grey = 0.20 + rng() * 0.15;
      const col  = new THREE.Color(grey, grey, grey+0.02).getHex();
      const mesh = buildBuilding(sx, sy, w, d, h, col);
      scene.add(mesh);
      const body = makeStaticBody(sx, sy, w/2, d/2);
      scenery.push({ mesh, body });
    }
  }
}

function streamScenery() {
  const target = roadGenSeq - 5;
  while (scenerySeedSeq < target) {
    if (scenerySeedSeq % SCENERY_SKIP === 0) {
      const p = getRoadPt(scenerySeedSeq);
      if (p) tryPlaceScenery(p);
    }
    scenerySeedSeq++;
  }

  // Cull scenery far behind player
  if (copBody) {
    const cop = copBody.position;
    const cullDist = ROAD_BUFFER_BEHIND + 400;
    for (let i = scenery.length - 1; i >= 0; i--) {
      const s  = scenery[i];
      const sp = s.mesh.position;
      if (Math.hypot(sp.x - cop.x, sp.z - cop.z) > cullDist) {
        scene.remove(s.mesh);
        s.mesh.traverse(c => { if (c.geometry) c.geometry.dispose(); });
        try { cannonWorld.removeBody(s.body); } catch(e) {}
        scenery.splice(i, 1);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
//  PIT DETECTION
// ═══════════════════════════════════════════════════════
let pitCooldown = 0;

// Called by cop body's collide event when it hits the suspect
function tryPITContact(evt) {
  if (pitDone || pitCooldown > 0) return;

  const copAngle  = -getYAngle(copBody.quaternion);
  const suspAngle = -getYAngle(suspBody.quaternion);
  const adiff     = Math.abs(angleDiff(copAngle, suspAngle));
  if (adiff < 0.12 || adiff > 1.1) return;

  const copFwd = bodyFwd(copBody);
  const copV   = copBody.velocity, suspV = suspBody.velocity;
  const relSpd = (copV.x - suspV.x)*copFwd.x + (copV.z - suspV.z)*copFwd.y;
  if (relSpd < 2.0) return;

  // Valid PIT contact — start rotation tracking
  pitTrackActive = true;
  pitAccumRot    = 0;
  pitLastAngle   = -getYAngle(suspBody.quaternion);
  pitCooldown    = 1.5;

  const q = (relSpd/20)*0.45 + (1 - Math.abs(adiff - 0.45)/0.5)*0.55;
  pitRating = q>0.78 ? 'TEXTBOOK' : q>0.55 ? 'GOOD' : q>0.35 ? 'ROUGH' : 'LUCKY';
  playImpact(42, 0.75);
}

// Setup cop collision listener — called after buildWorld creates the bodies
function setupCollisionListeners() {
  copBody.addEventListener('collide', evt => {
    if (state !== 'playing' || crashFlag) return;
    const tag = evt.body.userData;
    const spd = copBody.velocity.length();
    if (tag === 'static'  && spd > 4) crashFlag = true;
    if (tag === 'traffic' && spd > 3) crashFlag = true;
    if (tag === 'suspect' && !pitDone && pitCooldown <= 0) tryPITContact(evt);
  });

  // Suspect crashes hard into traffic or scenery → engine disabled (player wins)
  suspBody.addEventListener('collide', evt => {
    if (state !== 'playing' || suspEngineDisabled) return;
    const tag = evt.body.userData;
    if (tag === 'traffic' || tag === 'static') {
      const sv = suspBody.velocity, ov = evt.body.velocity;
      const relSpd = Math.hypot(sv.x - ov.x, sv.z - ov.z);
      if (relSpd > 8) {   // ~29 km/h relative — serious crash
        suspEngineDisabled = true;
        pitDone = true;
        playImpact(55, 1.0);
      }
    }
  });
}

// Per-frame PIT tracking — accumulates suspect rotation after a valid contact
function checkPIT(dt) {
  pitCooldown -= dt;
  if (!pitTrackActive) return;

  const angle = -getYAngle(suspBody.quaternion);
  pitAccumRot += Math.abs(angleDiff(angle, pitLastAngle));
  pitLastAngle  = angle;

  // 160° spin = engine disabled (no wheels to check anymore — rotation alone is the condition)
  if (pitAccumRot >= Math.PI * (160 / 180)) {
    suspEngineDisabled = true;
    pitDone            = true;
    pitTrackActive     = false;
  }

  // Timeout: reset tracking after 10 s if not triggered
  if (pitCooldown < -10) { pitTrackActive = false; pitAccumRot = 0; }
}

// ═══════════════════════════════════════════════════════
//  SKID MARKS
// ═══════════════════════════════════════════════════════
function addSkids(body) {
  const vel = body.velocity;
  const rt  = bodyRt(body);
  const lat = Math.abs(vel.x*rt.x + vel.z*rt.y);
  if (lat < 1.5 && !inp.handbrake) return;
  const pos = body.position;
  const fwd = bodyFwd(body);
  const bx  = pos.x - fwd.x*CAR_L*0.3;
  const by  = pos.z - fwd.y*CAR_L*0.3;
  const hw  = CAR_W*0.42;
  for (const side of [-1,1]) {
    if (skidCount < SKID_MAX) {
      const si = skidCount*3;
      skidPositions[si]   = bx + rt.x*hw*side;
      skidPositions[si+1] = 0.12;
      skidPositions[si+2] = by + rt.y*hw*side;
      skidCount++;
    }
  }
  skidMesh.geometry.attributes.position.needsUpdate = true;
  skidMesh.geometry.setDrawRange(0, skidCount);
}

// ═══════════════════════════════════════════════════════
//  TOAST / CHATTER
// ═══════════════════════════════════════════════════════
let toastTimer=0;
function showToast(msg, col) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.color=col||'#e8d040'; el.style.opacity='1';
  toastTimer=1.8;
}
function showChatter(msg) {
  const el=document.getElementById('chatter');
  el.textContent=msg; el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0', 2800);
}
let chatCooldown=8;
function maybeChatUpdate(dt) {
  chatCooldown-=dt;
  if (chatCooldown<=0) {
    chatCooldown=12+rng()*14;
    showChatter(CHATTER_LINES[Math.floor(rng()*CHATTER_LINES.length)]);
  }
}

// ═══════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════
const wCtx = document.getElementById('wheel-cvs').getContext('2d');
const mCtx = document.getElementById('minimap-cvs').getContext('2d');

function updateHUD(dt) {
  const secs = Math.ceil(timer);
  const tel  = document.getElementById('hud-timer');
  tel.textContent = secs + 's';
  tel.className   = timer<5?'crit':timer<15?'warn':'';

  const vel = copBody.velocity;
  const kph = Math.round(Math.hypot(vel.x, vel.z)*3.6);
  document.getElementById('hud-speed').textContent = kph + ' km/h';

  const sv = suspBody.velocity;
  const suspSpd = Math.round(Math.hypot(sv.x, sv.z)*3.6);
  const nr  = findNearRoad(suspBody.position.x, suspBody.position.z, suspRoadSeq);
  const onRoad = nr.dist < ROAD_HALF + 2;
  document.getElementById('hud-state').textContent = 'SUSPECT ' + suspSpd + ' · ' + (onRoad?'ON ROAD':'OFF ROAD');

  toastTimer -= dt;
  if (toastTimer <= 0) document.getElementById('toast').style.opacity='0';

  // Steering wheel
  wCtx.clearRect(0,0,80,80);
  wCtx.save(); wCtx.translate(40,40); wCtx.rotate(inp.steer * MAX_STEER * 2.2);
  wCtx.strokeStyle='#5a4838'; wCtx.lineWidth=5;
  wCtx.beginPath(); wCtx.arc(0,0,28,0,Math.PI*2); wCtx.stroke();
  wCtx.lineWidth=3;
  for (let i=0;i<3;i++) {
    wCtx.save(); wCtx.rotate(i*Math.PI*2/3);
    wCtx.beginPath(); wCtx.moveTo(0,0); wCtx.lineTo(0,-25); wCtx.stroke();
    wCtx.restore();
  }
  wCtx.fillStyle='#5a4838'; wCtx.beginPath(); wCtx.arc(0,0,5,0,Math.PI*2); wCtx.fill();
  wCtx.restore();

  // Minimap — player-relative 400m window
  const mmW=160, mmH=100;
  mCtx.fillStyle='#080c10'; mCtx.fillRect(0,0,mmW,mmH);

  const ms  = 0.12; // pixels per metre
  const cop = copBody.position;
  const ox  = mmW/2 + cop.x*ms;
  const oy  = mmH/2 + cop.z*ms;

  const WIN  = Math.ceil(400/ROAD_STEP);
  const si   = Math.max(0, copRoadSeq - roadBaseSeq - WIN);
  const ei   = Math.min(roadPts.length-1, copRoadSeq - roadBaseSeq + WIN);

  mCtx.beginPath();
  for (let i=si; i<=ei; i+=4) {
    const p=roadPts[i];
    const sx=-p.x*ms+ox, sy=-p.y*ms+oy;  // negate both to match camera orientation
    i===si ? mCtx.moveTo(sx,sy) : mCtx.lineTo(sx,sy);
  }
  mCtx.strokeStyle='#3a3530';
  mCtx.lineWidth = Math.max(4, Math.round(ROAD_HALF*2*ms));
  mCtx.stroke();

  function mmDot(body, col) {
    const p = body.position;
    mCtx.beginPath(); mCtx.arc(-p.x*ms+ox, -p.z*ms+oy, 3, 0, Math.PI*2);
    mCtx.fillStyle=col; mCtx.fill();
  }
  mmDot(copBody,'#4488ff');
  mmDot(suspBody,'#ff4422');
  for (const t of trafficArr) mmDot(t.body,'#5a4838');
}

// ═══════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════
function updateCamera(dt) {
  const pos = copBody.position;
  const fwd = bodyFwd(copBody);

  const tPos = new THREE.Vector3(pos.x - fwd.x*30, 38, pos.z - fwd.y*30);
  const tLook= new THREE.Vector3(pos.x + fwd.x*15,  3, pos.z + fwd.y*15);

  camPos.lerp(tPos,  7*dt);
  camLook.lerp(tLook, 7*dt);
  camera.position.copy(camPos);
  camera.lookAt(camLook);
}

// ═══════════════════════════════════════════════════════
//  LIGHT BAR FLASH
// ═══════════════════════════════════════════════════════
let lbFlash=false, lbTimer=0;
function updateLightBar(dt) {
  if (!copMesh) return;
  lbTimer+=dt;
  if (lbTimer>0.25) { lbTimer=0; lbFlash=!lbFlash; }
  const lb = copMesh.userData.lightBar;
  if (!lb) return;
  const cv = copBody.velocity;
  const spd = Math.hypot(cv.x, cv.z);
  if (spd<0.5) { lb[0].material.emissiveIntensity=0.1; lb[1].material.emissiveIntensity=0.1; return; }
  lb[0].material.emissiveIntensity = lbFlash ? 1.2 : 0.05;
  lb[1].material.emissiveIntensity = lbFlash ? 0.05: 1.2;
}

// yOff: vertical shift from physics body center to Three.js mesh group origin.
// RaycastVehicle chassis center ≈ 1.16m → offset -1.0 puts mesh group near ground.
// Traffic box center ≈ 0.65m (CAR_H/2) → offset -0.65 puts mesh group at ground.
function syncMesh(mesh, body, yOff = -1.0) {
  mesh.position.copy(body.position);
  mesh.position.y += yOff;
  mesh.quaternion.copy(body.quaternion);
}

// ═══════════════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════════════
let lastT=0;

function gameUpdate(dt) {
  if (!locked) return;

  // Road management — extend and cull buffer
  const prevLen = roadPts.length;
  manageRoadBuffer();
  if (roadPts.length !== prevLen) updateRoadMesh();
  streamTraffic();
  streamScenery();

  // Update cop road sequence
  const copNr = findNearRoad(copBody.position.x, copBody.position.z, copRoadSeq);
  copRoadSeq = copNr.seq;

  // Auto-recenter steering
  if (steerCfg.recenter > 0) {
    inp.steer *= Math.max(0, 1 - steerCfg.recenter * dt);
    if (Math.abs(inp.steer) < 0.001) inp.steer = 0;
  }

  applyThrusters(copBody, inp, 1800, 250, copRoadSeq);
  updateDebugArrows(copArrows, copBody, inp, 1800, 250);
  suspectAI(dt);
  updateDebugArrows(suspArrows, suspBody,
    { throttle: !suspEngineDisabled, brake: false, handbrake: false, steer: 0 },
    1200, 38 * DIFF_SETTINGS[diff].aiSpd * suspSpdMul * 3.6);
  for (const t of trafficArr) trafficStep(t, dt);

  cannonWorld.step(1/60, Math.min(dt, 1/30), 3);

  syncMesh(copMesh,  copBody, -CAR_H / 2);
  syncMesh(suspMesh, suspBody, -CAR_H / 2);
  for (const t of trafficArr) syncMesh(t.mesh, t.body, -CAR_H / 2);

  addSkids(copBody);
  addSkids(suspBody);

  updateLightBar(dt);
  updateCamera(dt);
  updateAudio(dt);
  updateHUD(dt);
  maybeChatUpdate(dt);
  checkPIT(dt);

  timer -= dt;
  if (timer <= 0) { endGame('time_up'); return; }
  if (crashFlag)  { endGame('cop_crash'); return; }

  const sv   = suspBody.velocity;
  const sspd = Math.hypot(sv.x, sv.z);
  // Win if suspect is nearly stopped for 4 s for ANY reason
  // (successful PIT, crash into traffic, crash into scenery, etc.)
  if ((suspEngineDisabled || pitDone) && sspd < 1.0) {
    suspStopTimer += dt;
    if (suspStopTimer >= 4.0) { endGame('cop_wins'); return; }
  } else {
    suspStopTimer = 0;
  }
}

function countdownUpdate(dt) {
  cdTimer-=dt;
  if (cdTimer<=0 && cdCount>0) { cdCount--; cdTimer=0.5; }  // "GET READY" → "GO!"
  if (cdCount<=0 && cdTimer<=0) {
    state='playing';
    canvas_requestLock();
    const cdEl=document.getElementById('cd-overlay');
    if (cdEl) cdEl.style.display='none';
  }

  // Rolling start: auto-drive both cars on the road during countdown
  if (copBody && suspBody) {
    copRoadFollowAI();   // cop follows road at up to 120 km/h; player takes over at GO!
    suspectAI(dt);
    for (const t of trafficArr) trafficStep(t, dt);
    cannonWorld.step(1/60, Math.min(dt, 1/30), 3);
    syncMesh(copMesh, copBody, -CAR_H/2); syncMesh(suspMesh, suspBody, -CAR_H/2);
    for (const t of trafficArr) syncMesh(t.mesh, t.body, -CAR_H / 2);
    updateLightBar(dt);
    const prevLen = roadPts.length;
    manageRoadBuffer();
    if (roadPts.length !== prevLen) updateRoadMesh();
    streamTraffic(); streamScenery();
  }
  if (copBody) { updateHUD(dt); updateCamera(dt); }
}

// ═══════════════════════════════════════════════════════
//  WORLD CONSTRUCTION
// ═══════════════════════════════════════════════════════
function buildWorld() {
  // Clear Three.js scene (lights stay)
  scene.children.filter(c=>c.type!=='DirectionalLight'&&c.type!=='AmbientLight')
    .forEach(c=>scene.remove(c));
  roadMeshDynamic = null;
  roadMarkMesh    = null;
  skidMesh        = null;
  scenery    = [];
  trafficArr = [];
  skidCount  = 0;
  if (copArrows.length)  { removeArrows(copArrows);  copArrows  = []; }
  if (suspArrows.length) { removeArrows(suspArrows); suspArrows = []; }

  buildGroundPlane();
  initRoadMesh();
  updateRoadMesh();
  buildSkidSystem();

  // Populate initial scenery
  scenerySeedSeq = 0;
  streamScenery();

  // Player cars
  copMesh  = buildCarMesh('cop');
  suspMesh = buildCarMesh('suspect');
  scene.add(copMesh, suspMesh);

  const p0  = getRoadPt(roadBaseSeq) || roadPts[0];
  const p35 = getRoadPt(roadBaseSeq + 35) || roadPts[Math.min(35, roadPts.length-1)];

  copBody  = makeBoxCar(p0.x,  p0.y,  roadFwdAngle(p0,  1), 'cop');
  suspBody = makeBoxCar(p35.x, p35.y, roadFwdAngle(p35, 1), 'suspect');
  suspBody.angularDamping = DIFF_SETTINGS[diff].angDamp;  // spin resistance per difficulty
  copRoadSeq  = roadBaseSeq;
  suspRoadSeq = roadBaseSeq + 35;

  // Debug arrows: green=front thrusters, orange=rear thrusters
  copArrows  = makeDebugArrows(0x00ff88, 0xff8800);
  suspArrows = makeDebugArrows(0x44aaff, 0xff4488);

  setupCollisionListeners();

  // Rolling start: both cars begin with forward velocity
  const cfwd = bodyFwd(copBody);
  copBody.velocity.set(cfwd.x * 14, 0, cfwd.y * 14);
  const sfwd = bodyFwd(suspBody);
  const sStart = 38 * DIFF_SETTINGS[diff].aiSpd * suspSpdMul * 0.6;
  suspBody.velocity.set(sfwd.x * sStart, 0, sfwd.y * sStart);

  // Start traffic well ahead so player doesn't immediately crash into a stopped car.
  // 160 seqs = 320 m gives plenty of run-up space before first bystander.
  trafficSpawnSeq = { fwd: roadBaseSeq + 160, onc: roadBaseSeq + 160 };
  streamTraffic();
}

// ═══════════════════════════════════════════════════════
//  GAME STATE MANAGEMENT
// ═══════════════════════════════════════════════════════
function startGame() {
  initAudio();
  const rawSeed=document.getElementById('seed-input').value.trim();
  seed=rawSeed ? (parseInt(rawSeed,10)||hashStr(rawSeed)) : (Math.random()*999999999|0);
  document.getElementById('seed-input').value=seed;
  rng=mkRNG(seed);
  suspSpdMul = 1.0 + rng() * DIFF_SETTINGS[diff].spdMulMax;  // speed varies per seed+diff

  buildPhysWorld();
  initRoad();
  buildWorld();

  timer=DIFF_SETTINGS[diff].time;
  cdCount=1; cdTimer=1.0;  // "GET READY" (1 s) → "GO!" (0.5 s)
  pitDone=false; pitRating=''; endReason=''; pitCooldown=0; crashFlag=false;
  inp.throttle=inp.brake=inp.handbrake=false; inp.steer=0;
  suspectLatShift=0; suspStopTimer=0; suspOvertakeTimer=0;
  suspEngineDisabled=false; pitTrackActive=false; pitAccumRot=0; pitLastAngle=0;
  locked=false; chatCooldown=8;
  skidCount=0;

  if (copBody) {
    const p = copBody.position;
    camPos.set(p.x-20, 38, p.z-20);
    camLook.set(p.x+10, 3, p.z+10);
  }

  state='countdown';
  document.getElementById('ov-start').classList.add('hidden');
  document.getElementById('ov-end').classList.add('hidden');
  document.getElementById('ov-pause').classList.add('hidden');
}

function endGame(reason) {
  endReason=reason;
  state='ended';
  document.exitPointerLock&&document.exitPointerLock();
  locked=false;

  if (engGain)  engGain.gain.value=0;
  if (sirenG)   sirenG.gain.value=0;
  if (screechG) screechG.gain.value=0;

  const elapsed=DIFF_SETTINGS[diff].time - timer;
  let title, col, meta;

  if (reason==='cop_wins') {
    title='PIT SUCCESS'; col='#44dd88';
    meta='Rating: '+pitRating+'\nTime: '+elapsed.toFixed(1)+'s';
    playJingle(true);
  } else if (reason==='cop_crash') {
    title='MISSION FAILED'; col='#ff4422';
    meta='Cop crashed\nTime: '+elapsed.toFixed(1)+'s';
    playJingle(false);
  } else {
    title="TIME'S UP"; col='#ff8820';
    meta='Suspect escaped\nTime: '+elapsed.toFixed(1)+'s';
    playJingle(false);
  }

  const rt=document.getElementById('result-title');
  rt.textContent=title; rt.style.color=col;
  document.getElementById('result-meta').textContent=meta+'\nSeed: '+seed;
  document.getElementById('ov-end').classList.remove('hidden');

  let secs = 3;
  const cdEl2 = document.getElementById('return-countdown');
  cdEl2.textContent = 'Returning to menu in ' + secs + 's…';
  const retInterval = setInterval(() => {
    secs--;
    if (secs > 0) {
      cdEl2.textContent = 'Returning to menu in ' + secs + 's…';
    } else {
      clearInterval(retInterval);
      document.getElementById('ov-end').classList.add('hidden');
      document.getElementById('ov-start').classList.remove('hidden');
      state = 'start';
    }
  }, 1000);
}

function hashStr(s) {
  let h=0; for (let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return Math.abs(h);
}

// ═══════════════════════════════════════════════════════
//  POINTER LOCK
// ═══════════════════════════════════════════════════════
function canvas_requestLock() {
  renderer.domElement.requestPointerLock();
}

function syncPauseSliders() {
  const s = steerCfg;
  const fmt = (v, d) => v === 0 ? 'off' : (+v).toFixed(d).replace(/\.?0+$/, '');
  document.getElementById('p-sl-sens').value    = s.sensitivity;
  document.getElementById('p-lbl-sens').textContent  = fmt(s.sensitivity, 4);
  document.getElementById('p-sl-nonlin').value   = s.nonlin;
  document.getElementById('p-lbl-nonlin').textContent = fmt(s.nonlin, 2);
  document.getElementById('p-sl-recenter').value = s.recenter;
  document.getElementById('p-lbl-recenter').textContent = s.recenter === 0 ? 'off' : fmt(s.recenter, 2);
  document.getElementById('p-sl-density').value  = trafficCfg.density;
  document.getElementById('p-lbl-density').textContent = trafficCfg.density.toFixed(1);
}

document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  if (!locked && state==='playing') {
    syncPauseSliders();
    document.getElementById('ov-pause').classList.remove('hidden');
  } else if (locked) {
    document.getElementById('ov-pause').classList.add('hidden');
  }
});

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
document.addEventListener('mousemove', e => {
  if (!locked || state!=='playing') return;
  const MAX_STEER_DELTA = 0.045;
  const nlFactor = 1 + steerCfg.nonlin * inp.steer * inp.steer;
  const delta = clamp(e.movementX * steerCfg.sensitivity * nlFactor, -MAX_STEER_DELTA, MAX_STEER_DELTA);
  inp.steer = clamp(inp.steer + delta, -1, 1);
});
document.addEventListener('mousedown', e => {
  if (e.button===0) inp.throttle=true;
  if (state!=='playing' || !locked) return;
  if (e.button===2) inp.brake=true;
  if (e.button===1) { e.preventDefault(); inp.handbrake=true; }
});
document.addEventListener('mouseup', e => {
  if (e.button===0) inp.throttle=false;
  if (e.button===2) inp.brake=false;
  if (e.button===1) inp.handbrake=false;
});
renderer.domElement.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key==='Escape' && state==='playing') {
    if (locked) document.exitPointerLock();
    else renderer.domElement.requestPointerLock();
  }
});

// ═══════════════════════════════════════════════════════
//  COUNTDOWN OVERLAY
// ═══════════════════════════════════════════════════════
function drawCountdown(ts) {
  if (state!=='countdown') return;
  let cdEl = document.getElementById('cd-overlay');
  if (!cdEl) {
    cdEl=document.createElement('div');
    cdEl.id='cd-overlay';
    cdEl.style.cssText='position:fixed;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;pointer-events:none;font-family:monospace;font-weight:900;text-shadow:0 0 40px currentColor;';
    document.body.appendChild(cdEl);
  }
  cdEl.style.display='flex';
  const label = cdCount>0 ? 'GET READY' : 'GO!';
  const col   = cdCount>0 ? '#e8a020'   : '#44dd88';
  const sz    = cdCount>0 ? '52px'      : '110px';
  cdEl.innerHTML=`<span style="font-size:${sz};color:${col};letter-spacing:.18em">${label}</span>`;
  if (state!=='countdown') cdEl.style.display='none';
}

function loopEx(ts) {
  requestAnimationFrame(loopEx);
  const dt = Math.min((ts-lastT)/1000, 0.05); lastT=ts;

  if (state==='playing') gameUpdate(dt);
  else if (state==='countdown') { countdownUpdate(dt); drawCountdown(ts); }

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════
//  UI HANDLERS
// ═══════════════════════════════════════════════════════
document.getElementById('diff-group').addEventListener('click', e => {
  const btn=e.target.closest('.diff-btn'); if (!btn) return;
  diff=btn.dataset.diff;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b===btn));
});
document.getElementById('btn-rng').addEventListener('click',
  ()=>document.getElementById('seed-input').value=(Math.random()*999999999|0));
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-home').addEventListener('click',
  ()=>window.parent.postMessage({sq:'show',page:0},'*'));
document.getElementById('sl-sens').addEventListener('input', function() {
  steerCfg.sensitivity = parseFloat(this.value);
  document.getElementById('lbl-sens').textContent = (+this.value).toFixed(4).replace(/0+$/,'');
});
document.getElementById('sl-nonlin').addEventListener('input', function() {
  steerCfg.nonlin = parseFloat(this.value);
  document.getElementById('lbl-nonlin').textContent = (+this.value).toFixed(2).replace(/\.?0+$/,'');
});
document.getElementById('sl-recenter').addEventListener('input', function() {
  steerCfg.recenter = parseFloat(this.value);
  document.getElementById('lbl-recenter').textContent = steerCfg.recenter === 0 ? 'off' : (+this.value).toFixed(2).replace(/\.?0+$/,'');
});
document.getElementById('sl-density').addEventListener('input', function() {
  trafficCfg.density = parseFloat(this.value);
  document.getElementById('lbl-density').textContent = (+this.value).toFixed(1);
});
document.getElementById('ov-pause').addEventListener('click', e => {
  if (!e.target.closest('button, input[type=range]')) renderer.domElement.requestPointerLock();
});
document.getElementById('btn-pause-resume').addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});
document.getElementById('btn-pause-restart').addEventListener('click', () => {
  document.getElementById('ov-pause').classList.add('hidden');
  startGame();
});
document.getElementById('btn-pause-newseed').addEventListener('click', () => {
  document.getElementById('seed-input').value = (Math.random()*999999999|0);
  document.getElementById('ov-pause').classList.add('hidden');
  startGame();
});
document.getElementById('btn-pause-exit').addEventListener('click', () => {
  state = 'start';
  document.getElementById('ov-pause').classList.add('hidden');
  document.getElementById('ov-start').classList.remove('hidden');
});

document.getElementById('p-sl-sens').addEventListener('input', function() {
  steerCfg.sensitivity = parseFloat(this.value);
  document.getElementById('p-lbl-sens').textContent = (+this.value).toFixed(4).replace(/\.?0+$/, '');
  document.getElementById('sl-sens').value = this.value;
  document.getElementById('lbl-sens').textContent = document.getElementById('p-lbl-sens').textContent;
});
document.getElementById('p-sl-nonlin').addEventListener('input', function() {
  steerCfg.nonlin = parseFloat(this.value);
  document.getElementById('p-lbl-nonlin').textContent = (+this.value).toFixed(2).replace(/\.?0+$/, '');
  document.getElementById('sl-nonlin').value = this.value;
  document.getElementById('lbl-nonlin').textContent = document.getElementById('p-lbl-nonlin').textContent;
});
document.getElementById('p-sl-recenter').addEventListener('input', function() {
  steerCfg.recenter = parseFloat(this.value);
  const txt = steerCfg.recenter === 0 ? 'off' : (+this.value).toFixed(2).replace(/\.?0+$/, '');
  document.getElementById('p-lbl-recenter').textContent = txt;
  document.getElementById('sl-recenter').value = this.value;
  document.getElementById('lbl-recenter').textContent = txt;
});
document.getElementById('p-sl-density').addEventListener('input', function() {
  trafficCfg.density = parseFloat(this.value);
  const txt = (+this.value).toFixed(1);
  document.getElementById('p-lbl-density').textContent = txt;
  document.getElementById('sl-density').value = this.value;
  document.getElementById('lbl-density').textContent = txt;
});
document.getElementById('btn-copy-seed').addEventListener('click',
  ()=>navigator.clipboard.writeText(String(seed)).catch(()=>{}));

(()=>{ const p=new URLSearchParams(location.search); if (p.has('seed')) document.getElementById('seed-input').value=p.get('seed'); })();

// ═══════════════════════════════════════════════════════
//  INIT — generate preview scene for start screen
// ═══════════════════════════════════════════════════════
function initPreview() {
  rng = mkRNG(Math.random()*999999999|0);
  buildPhysWorld();
  initRoad();
  buildWorld();

  // Camera looks down along the road start
  const p = roadPts[Math.min(60, roadPts.length-1)];
  camera.position.set(p.x + 80, 55, p.y + 60);
  camera.lookAt(p.x, 0, p.y);
}
initPreview();

requestAnimationFrame(loopEx);

</script>
